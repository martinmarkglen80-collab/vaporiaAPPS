<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Items - Vaporia Inventory System</title>
<style>
/* ===== Body ===== */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #d8c4ad;
    position: relative;
}

/* ===== Item Cards ===== */
.items-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
}

.item-card {
    background: white;
    border-radius: 8px;
    padding: 10px;
    width: 200px;
    text-align: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.item-card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 5px;
}

/* ===== Edit/Delete Buttons ===== */
.item-actions {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 8px;
}

.item-actions button {
    padding: 4px 8px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 14px;
    color: white;
}

.edit-btn {
    background: #2e86de;
}

.edit-btn:hover {
    background: #1b4f72;
}

.delete-btn {
    background: #c0392b;
}

.delete-btn:hover {
    background: #7b241c;
}

/* ===== Modal ===== */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #fff;
    padding: 20px;
    border-radius: 8px;
    width: 300px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.modal-close {
    align-self: flex-end;
    cursor: pointer;
    font-size: 20px;
}

/* ===== Floating Action Button ===== */
.fab-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #2e86de;
    color: white;
    border: none;
    border-radius: 50%;
    padding: 15px;
    font-size: 20px;
    cursor: pointer;
}
</style>
</head>
<body>

<h3>Available Items</h3>
<div class="items-grid" id="itemsGrid"></div>

<div class="not-available">
    <h3>NOT AVAIL</h3>
    <div class="items-grid" id="outOfStockGrid"></div>
</div>

<!-- Floating Action Button -->
<button class="fab-btn" id="openModalBtn">🔍 / 📷</button>

<!-- Modal for search, scan, and edit -->
<div class="modal" id="searchModal">
    <div class="modal-content">
        <span class="modal-close" id="closeModalBtn">&times;</span>
        <input type="text" id="searchInput" placeholder="Search items..." oninput="filterItems()">
        <input type="text" id="modalName" placeholder="Item Name">
        <input type="text" id="modalDescription" placeholder="Description">
        <input type="number" id="modalStock" placeholder="Stock">
        <input type="file" accept="image/*" capture="environment" id="modalImageInput" style="display:none;">
        <button onclick="document.getElementById('modalImageInput').click()">📷 Scan / Upload</button>
        <button id="saveBtn">Save</button>
    </div>
</div>

<script>
let allItems = [];
let editingItemId = null;

/* ===== Modal ===== */
const modal = document.getElementById("searchModal");
const openModalBtn = document.getElementById("openModalBtn");
const closeModalBtn = document.getElementById("closeModalBtn");
const saveBtn = document.getElementById("saveBtn");
const modalName = document.getElementById("modalName");
const modalDescription = document.getElementById("modalDescription");
const modalStock = document.getElementById("modalStock");
const modalImageInput = document.getElementById("modalImageInput");

openModalBtn.addEventListener("click", () => modal.style.display = "flex");
closeModalBtn.addEventListener("click", () => {
    modal.style.display = "none";
    editingItemId = null;
});
window.addEventListener("click", e => {
    if(e.target == modal) {
        modal.style.display = "none";
        editingItemId = null;
    }
});

/* ===== Load Items ===== */
async function loadItems() {
    try {
        const res = await fetch("/api/items", { credentials: "include" });
        if(res.status === 401) { window.location = "login.html"; return; }
        allItems = await res.json();
        renderItems(allItems);
    } catch(err) {
        console.error(err);
    }
}

/* ===== Render Items ===== */
function renderItems(items) {
    const itemsGrid = document.getElementById("itemsGrid");
    const outGrid = document.getElementById("outOfStockGrid");
    itemsGrid.innerHTML = "";
    outGrid.innerHTML = "";

    items.forEach(item => {
        const card = `
        <div class="item-card">
            <img src="${item.image || ''}" onerror="this.src='https://via.placeholder.com/200'">
            <h4>${item.name}</h4>
            <p>${item.description || ''}</p>
            <p>Stock: ${item.stock}</p>
            <div class="item-actions">
                <button class="edit-btn" onclick="openEdit(${JSON.stringify(item).replace(/"/g,'&quot;')})">✏️ Edit</button>
                <button class="delete-btn" onclick="deleteItem('${item._id}')">🗑️ Delete</button>
            </div>
        </div>`;
        if(item.stock > 0) itemsGrid.innerHTML += card;
        else outGrid.innerHTML += card;
    });
}

/* ===== Add Item ===== */
async function addItem() {
    const name = document.getElementById("name").value;
    const description = document.getElementById("description").value;
    const stock = document.getElementById("stock").value;
    const image = document.getElementById("imageInput").files[0];

    if(!name || !stock) { alert("Name and stock required"); return; }

    const formData = new FormData();
    formData.append("name", name);
    formData.append("description", description);
    formData.append("stock", stock);
    if(image) formData.append("image", image);

    const res = await fetch("/api/items", {
        method: "POST",
        body: formData,
        credentials: "include"
    });
    const data = await res.json();
    alert(data.message);

    document.getElementById("name").value = "";
    document.getElementById("description").value = "";
    document.getElementById("stock").value = "";
    document.getElementById("imageInput").value = "";

    loadItems();
}

/* ===== Edit Item ===== */
function openEdit(item) {
    editingItemId = item._id;
    modalName.value = item.name;
    modalDescription.value = item.description;
    modalStock.value = item.stock;
    modal.style.display = "flex";
}

saveBtn.addEventListener("click", async () => {
    if(!editingItemId) { modal.style.display = "none"; return; }

    const formData = new FormData();
    formData.append("name", modalName.value);
    formData.append("description", modalDescription.value);
    formData.append("stock", modalStock.value);
    if(modalImageInput.files[0]) formData.append("image", modalImageInput.files[0]);

    const res = await fetch(`/api/items/${editingItemId}`, {
        method: "PUT",
        body: formData,
        credentials: "include"
    });
    const data = await res.json();
    alert(data.message);

    modal.style.display = "none";
    editingItemId = null;
    modalName.value = "";
    modalDescription.value = "";
    modalStock.value = "";
    modalImageInput.value = "";

    loadItems();
});

/* ===== Delete Item ===== */
async function deleteItem(id) {
    if(!confirm("Are you sure you want to delete this item?")) return;

    const res = await fetch(`/api/items/${id}`, { method: "DELETE", credentials: "include" });
    const data = await res.json();
    alert(data.message);

    loadItems();
}

/* ===== Filter Items ===== */
function filterItems() {
    const term = document.getElementById("searchInput").value.toLowerCase();
    const filtered = allItems.filter(item =>
        item.name.toLowerCase().includes(term) ||
        (item.description && item.description.toLowerCase().includes(term))
    );
    renderItems(filtered);
}

loadItems();
</script>
</body>
</html>
