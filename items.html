<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Items - Vaporia Inventory System</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #d8c4ad;
}

/* TOPBAR */
.topbar {
    padding: 15px;
    background: rgba(193,168,142,0.9);
    display: flex;
    align-items: center;
}

.menu-btn {
    font-size: 26px;
    cursor: pointer;
    margin-right: 20px;
}

/* SIDEBAR */
.sidebar {
    position: fixed;
    left: -250px;
    top: 0;
    width: 250px;
    height: 100%;
    background: rgba(168,146,120,0.95);
    padding-top: 60px;
    transition: 0.3s;
    z-index: 9999;
}

.sidebar a {
    display: block;
    padding: 15px;
    text-decoration: none;
    color: #4b3a2a;
}

.sidebar.active {
    left: 0;
}

/* MAIN */
.main {
    padding: 30px;
}

/* ADD SECTION */
.add-section {
    background: rgba(200,180,150,0.95);
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

/* ITEMS */
.items-grid {
    display: flex;
    gap: 20px;
    overflow-x: auto;
}

.item-card {
    min-width: 200px;
    background: rgba(200,180,150,0.95);
    padding: 15px;
    border-radius: 12px;
    text-align: center;
    transition: 0.2s;
}

.item-card:hover {
    transform: scale(1.05);
}

.item-card img {
    width: 100%;
    height: 120px;
    object-fit: cover;
    border-radius: 8px;
}

.out-stock {
    border: 2px solid red;
}

.low-stock {
    border: 2px solid orange;
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
    <div class="menu-btn">☰</div>
    <h2>Items</h2>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <a href="dashboard.html">Dashboard</a>
    <a href="items.html">Items</a>
    <a href="sales.html">Sales</a>
    <a href="reports.html">Reports</a>
    <a href="suppliers.html">Suppliers</a>
</div>

<!-- MAIN -->
<div class="main">

    <!-- ADD SECTION -->
    <div class="add-section">
        <input id="name" placeholder="Name">
        <input id="description" placeholder="Description">
        <input id="stock" type="number" placeholder="Stock">
        <input id="price" type="number" placeholder="Price">
        <input type="file" id="imageInput">
        <img id="preview" style="width:100px; display:none;">
        <button onclick="addItem()">Add</button>
    </div>

    <!-- SEARCH -->
    <input id="search" placeholder="Search..." style="margin-bottom:10px; padding:5px;">

    <!-- ITEMS -->
    <div id="itemsGrid" class="items-grid"></div>

</div>

<script>
let allItems = [];
let previewURL;

/* ESCAPE HTML */
function escapeHTML(str) {
    return str.replace(/[&<>"']/g, m => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
    }[m]));
}

/* LOAD ITEMS */
async function loadItems() {
    const res = await fetch("/api/items", { credentials: "include" });
    const items = await res.json();

    allItems = items.sort((a, b) => a.name.localeCompare(b.name));

    const grid = document.getElementById("itemsGrid");
    grid.innerHTML = "";

    if (allItems.length === 0) {
        grid.innerHTML = "<p>No items yet</p>";
        return;
    }

    allItems.forEach(item => {
        const card = document.createElement("div");
        card.className = "item-card";

        if (item.stock === 0) card.classList.add("out-stock");
        else if (item.stock <= 5) card.classList.add("low-stock");

        card.innerHTML = `
            <img src="${item.image ? '/uploads/' + item.image : 'https://via.placeholder.com/150'}">
            <h4>${escapeHTML(item.name)}</h4>
            <p>${escapeHTML(item.description)}</p>

            <input class="edit-stock" type="number" value="${item.stock}">
            <input class="edit-price" type="number" value="${item.price}">

            <br><br>
            <button class="edit-btn">Save</button>
            <button class="delete-btn">Delete</button>
        `;

        /* DELETE */
        card.querySelector(".delete-btn").onclick = async () => {
            if (!confirm("Delete item?")) return;

            const res = await fetch("/api/items/" + item._id, {
                method: "DELETE",
                credentials: "include"
            });

            if (!res.ok) {
                alert("Delete failed");
                return;
            }

            loadItems();
        };

        /* EDIT */
        const editBtn = card.querySelector(".edit-btn");

        editBtn.onclick = async () => {
            const stock = Number(card.querySelector(".edit-stock").value);
            const price = Number(card.querySelector(".edit-price").value);

            if (isNaN(stock) || isNaN(price) || stock < 0 || price < 0) {
                alert("Invalid input");
                return;
            }

            editBtn.disabled = true;
            editBtn.textContent = "Saving...";

            try {
                const res = await fetch("/api/items/" + item._id, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include",
                    body: JSON.stringify({ stock, price })
                });

                if (!res.ok) throw new Error();

                loadItems();
            } catch {
                alert("Update failed");
            }

            editBtn.disabled = false;
            editBtn.textContent = "Save";
        };

        grid.appendChild(card);
    });
}

/* ADD ITEM */
async function addItem() {
    const name = document.getElementById("name").value.trim();
    const desc = document.getElementById("description").value.trim();
    const stock = Number(document.getElementById("stock").value);
    const price = Number(document.getElementById("price").value);
    const file = document.getElementById("imageInput").files[0];

    if (!name || !desc || isNaN(stock) || isNaN(price)) {
        alert("Invalid input");
        return;
    }

    const form = new FormData();
    form.append("name", name);
    form.append("description", desc);
    form.append("stock", stock);
    form.append("price", price);

    if (file) form.append("image", file);

    await fetch("/api/items", {
        method: "POST",
        body: form,
        credentials: "include"
    });

    loadItems();
}

/* SEARCH */
document.getElementById("search").addEventListener("input", e => {
    const val = e.target.value.toLowerCase();

    document.querySelectorAll(".item-card").forEach(card => {
        card.style.display = card.innerText.toLowerCase().includes(val) ? "" : "none";
    });
});

/* IMAGE PREVIEW */
document.getElementById("imageInput").addEventListener("change", e => {
    const file = e.target.files[0];
    const preview = document.getElementById("preview");

    if (previewURL) URL.revokeObjectURL(previewURL);

    if (file) {
        previewURL = URL.createObjectURL(file);
        preview.src = previewURL;
        preview.style.display = "block";
    }
});

/* INIT */
loadItems();
</script>

</body>
</html>
