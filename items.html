<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Items - Vaporia Inventory System</title>

<style>
body { margin:0; font-family:'Segoe UI',sans-serif; background:#d8c4ad; position:relative; }
body::before {
    content:""; position:fixed; top:0; left:0; width:100%; height:100%;
    background:url('vaporia.jpg'); background-size:400px auto;
    background-position:center top; opacity:0.24; z-index:0;
}

/* TOPBAR */
.topbar { padding:15px; background:rgba(193,168,142,0.9); display:flex; align-items:center; z-index:1; position:relative;}
.menu-btn { font-size:26px; cursor:pointer; margin-right:20px; }

/* SIDEBAR */
.sidebar {
    position:fixed; left:-250px; top:0; width:250px; height:100%;
    background:rgba(168,146,120,0.95); padding-top:60px;
    transition:0.3s; z-index:9999;
}
.sidebar a { display:block; padding:15px; text-decoration:none; color:#4b3a2a; }
.sidebar a:hover { background:rgba(143,123,101,0.9); color:white; }
.sidebar.active { left:0; }

/* MAIN */
.main { padding:30px; position:relative; z-index:1; }

/* ADD */
.add-section {
    background:rgba(200,180,150,0.95);
    padding:20px; border-radius:12px; margin-bottom:20px;
    display:flex; flex-wrap:wrap; gap:10px;
}
.add-section input { padding:8px; border-radius:5px; border:1px solid #a88a78; }
.add-section button {
    padding:8px 15px; background:#4b3a2a; color:white;
    border:none; border-radius:5px; cursor:pointer;
}

/* ITEMS */
.items-grid { display:flex; gap:20px; overflow-x:auto; }
.item-card {
    min-width:200px; background:rgba(200,180,150,0.95);
    padding:15px; border-radius:12px; text-align:center;
}
.item-card img { width:100%; height:150px; object-fit:cover; border-radius:8px; }

.item-actions { display:flex; justify-content:center; gap:10px; margin-top:10px; }
.edit-btn { background:#2e86de; color:white; border:none; padding:5px 10px; }
.delete-btn { background:#c0392b; color:white; border:none; padding:5px 10px; }

/* PRICE INPUT */
.price-input {
    width:80px;
    text-align:center;
    border:1px solid #a88a78;
    border-radius:5px;
    padding:3px;
}
.price-input:focus {
    outline:2px solid #4b3a2a;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="menu-btn">☰</div>
    <h2>Items</h2>
</div>

<div class="sidebar" id="sidebar">
    <a href="dashboard.html">Dashboard</a>
    <a href="items.html">Items</a>
    <a href="sales.html">Sales</a>
    <a href="reports.html">Reports</a>
    <a href="suppliers.html">Suppliers</a>
    <a href="#" id="logoutBtn">Logout</a>
</div>

<div class="main">

<div class="add-section">
    <input type="text" id="name" placeholder="Item Name">
    <input type="text" id="description" placeholder="Description">
    <input type="number" id="stock" placeholder="Stock">
    <input type="number" id="price" placeholder="Price">
    <input type="file" id="imageInput">
    <button onclick="addItem()">Add Item</button>
</div>

<h3>Available Items</h3>
<div class="items-grid" id="itemsGrid"></div>

<h3>Out of Stock</h3>
<div class="items-grid" id="outOfStockGrid"></div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const menuBtn = document.querySelector(".menu-btn");
const sidebar = document.getElementById("sidebar");
const logoutBtn = document.getElementById("logoutBtn");

menuBtn.onclick = e => { e.stopPropagation(); sidebar.classList.toggle("active"); };
document.addEventListener("click", () => sidebar.classList.remove("active"));

logoutBtn.onclick = async e => {
    e.preventDefault();
    await fetch("/logout",{method:"POST",credentials:"include"});
    location.replace("login.html");
};

/* LOAD ITEMS */
async function loadItems(){
    const res = await fetch("/api/items");
    const items = await res.json();

    const grid = document.getElementById("itemsGrid");
    const outGrid = document.getElementById("outOfStockGrid");

    grid.innerHTML="";
    outGrid.innerHTML="";

    items.forEach(item=>{
        const card=document.createElement("div");
        card.className="item-card";

        card.innerHTML=`
            <img src="${item.image || 'https://via.placeholder.com/150'}">
            <h4>${item.name}</h4>
            <p>${item.description}</p>
            <p>Stock: ${item.stock}</p>
            <p>₱<input type="number" class="price-input" value="${item.price}"></p>
            <div class="item-actions">
                <button class="edit-btn">Edit</button>
                <button class="delete-btn">Delete</button>
            </div>
        `;

        /* DELETE */
        card.querySelector(".delete-btn").onclick = async ()=>{
            await fetch("/api/items/"+item._id,{method:"DELETE"});
            loadItems();
        };

        /* EDIT NAME + DESC (PROMPT) */
        card.querySelector(".edit-btn").onclick = async ()=>{
            const newName = prompt("New name", item.name);
            if(!newName) return;

            const newDesc = prompt("New description", item.description);
            if(newDesc===null) return;

            await fetch("/api/items/"+item._id,{
                method:"PUT",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({name:newName,description:newDesc})
            });

            loadItems();
        };

        /* PRICE AUTO SAVE */
        const priceInput = card.querySelector(".price-input");

        async function savePrice(){
            const newPrice = Number(priceInput.value);
            if(isNaN(newPrice) || newPrice < 0) return;

            await fetch("/api/items/"+item._id,{
                method:"PUT",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({price:newPrice})
            });
        }

        // ENTER key
        priceInput.addEventListener("keydown", e=>{
            if(e.key==="Enter"){
                priceInput.blur();
            }
        });

        // SAVE on blur
        priceInput.addEventListener("blur", savePrice);

        if(item.stock>0) grid.appendChild(card);
        else outGrid.appendChild(card);
    });
}

/* ADD ITEM */
window.addItem = async ()=>{
    const name=document.getElementById("name").value.trim();
    const desc=document.getElementById("description").value;
    const stock=document.getElementById("stock").value;
    const price=document.getElementById("price").value;
    const image=document.getElementById("imageInput").files[0];

    if(!name){ alert("Item name required"); return; }

    const form=new FormData();
    form.append("name",name);
    form.append("description",desc);
    form.append("stock",stock);
    form.append("price",price);
    if(image) form.append("image",image);

    await fetch("/api/items",{method:"POST",body:form});

    document.getElementById("name").value="";
    document.getElementById("description").value="";
    document.getElementById("stock").value="";
    document.getElementById("price").value="";
    document.getElementById("imageInput").value="";

    loadItems();
};

loadItems();
});
</script>

</body>
</html>
