<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Items - Vaporia Inventory System</title>

<style>

body { margin:0; font-family:'Segoe UI',sans-serif; background:#d8c4ad; position:relative; }

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:url('vaporia.jpg');
background-size:400px auto;
background-position:center top;
opacity:0.24;
pointer-events:none;
z-index:0;
}

.topbar{
padding:15px;
background:rgba(193,168,142,0.9);
display:flex;
align-items:center;
z-index:1;
position:relative;
}

.menu-btn{
font-size:26px;
cursor:pointer;
margin-right:20px;
}

.sidebar{
position:fixed;
left:-250px;
top:0;
width:250px;
height:100%;
background:rgba(168,146,120,0.95);
padding-top:60px;
transition:0.3s;
z-index:9999;
}

.sidebar a{
display:block;
padding:15px;
text-decoration:none;
color:#4b3a2a;
font-size:18px;
}

.sidebar a:hover{
background:rgba(143,123,101,0.9);
color:white;
}

.sidebar.active{
left:0;
}

.main{
padding:30px;
position:relative;
z-index:1;
}

.add-section{
background:rgba(200,180,150,0.95);
padding:20px;
border-radius:12px;
margin-bottom:20px;
display:flex;
flex-wrap:wrap;
gap:10px;
align-items:center;
}

.add-section input{
padding:8px;
border-radius:5px;
border:1px solid #a88a78;
}

.add-section button{
padding:8px 15px;
background:#4b3a2a;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.add-section button:hover{
background:#2e1f13;
}

.items-grid{
display:flex;
flex-direction:column;
gap:15px;
}

.item-card{
background:rgba(200,180,150,0.95);
padding:15px;
border-radius:12px;
display:flex;
align-items:center;
gap:10px;
}

.item-card img{
width:100px;
height:100px;
object-fit:cover;
border-radius:8px;
}

.item-card input{
padding:5px;
border-radius:4px;
border:1px solid #a88a78;
width:100px;
}

.item-actions button{
margin-left:5px;
padding:5px 8px;
border:none;
border-radius:4px;
color:white;
cursor:pointer;
}

.save-btn{ background:#27ae60; }
.cancel-btn{ background:#c0392b; }

.delete-btn{
background:#c0392b;
color:white;
padding:5px 8px;
border:none;
border-radius:4px;
cursor:pointer;
}

.delete-btn:hover{
background:#7b241c;
}

</style>
</head>

<body>

<div class="topbar">
<div class="menu-btn">☰</div>
<h2>Items</h2>
</div>

<div class="sidebar" id="sidebar">
<a href="dashboard.html">Dashboard</a>
<a href="items.html">Items</a>
<a href="sales.html">Sales</a>
<a href="reports.html">Reports</a>
<a href="suppliers.html">Suppliers</a>
<a href="#" id="logoutBtn">Logout</a>
</div>

<div class="main">

<div class="add-section">
<input type="text" id="name" placeholder="Item Name">
<input type="text" id="description" placeholder="Description">
<input type="number" id="stock" placeholder="Stock">
<input type="number" id="price" placeholder="Price">

<input type="file" accept="image/*" capture="environment" id="imageInput" style="display:none;">

<button onclick="document.getElementById('imageInput').click()">📷 Scan / Upload</button>

<button onclick="addItem()">Add Item</button>
</div>

<div class="items-grid" id="itemsGrid"></div>

</div>

<script>

document.addEventListener("DOMContentLoaded",()=>{

const sidebar=document.getElementById("sidebar");
const menuBtn=document.querySelector(".menu-btn");
const logoutBtn=document.getElementById("logoutBtn");
const itemsGrid=document.getElementById("itemsGrid");

/* SIDEBAR */

menuBtn.onclick=e=>{
e.stopPropagation();
sidebar.classList.toggle("active");
};

document.addEventListener("click",e=>{
if(!sidebar.contains(e.target)&&!menuBtn.contains(e.target)){
sidebar.classList.remove("active");
}
});

/* LOGOUT */

logoutBtn.onclick=async e=>{
e.preventDefault();
await fetch("/logout",{method:"POST",credentials:"include"});
window.location="login.html";
};

/* LOAD ITEMS */

async function loadItems(){

const res=await fetch("/api/items",{credentials:"include"});
const items=await res.json();

itemsGrid.innerHTML="";

items.forEach(item=>{

const card=document.createElement("div");
card.classList.add("item-card");

card.innerHTML=`
<img src="${item.image || 'vaporia.jpg'}">
<input type="text" value="${item.name}" class="name">
<input type="text" value="${item.description}" class="description">
<input type="number" value="${item.stock}" class="stock">
<input type="number" value="${item.price}" class="price">

<div class="item-actions">
<button class="save-btn">Save</button>
<button class="cancel-btn">Cancel</button>
<button class="delete-btn">Delete</button>
</div>
`;

/* SAVE */

card.querySelector(".save-btn").onclick=async()=>{

const name=card.querySelector(".name").value;
const desc=card.querySelector(".description").value;
const stock=parseInt(card.querySelector(".stock").value);
const price=parseFloat(card.querySelector(".price").value);

await fetch(`/api/items/${item._id}`,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,description:desc,stock,price}),
credentials:"include"
});

loadItems();

};

/* CANCEL */

card.querySelector(".cancel-btn").onclick=()=>{
loadItems();
};

/* DELETE */

card.querySelector(".delete-btn").onclick=async()=>{

await fetch(`/api/items/${item._id}`,{
method:"DELETE",
credentials:"include"
});

loadItems();

};

itemsGrid.appendChild(card);

});

}

/* ADD ITEM */

window.addItem=async()=>{

const name=document.getElementById("name").value;
const description=document.getElementById("description").value;
const stock=parseInt(document.getElementById("stock").value);
const price=parseFloat(document.getElementById("price").value);
const imageInput=document.getElementById("imageInput");

if(!name||!stock||!price){
alert("Name, stock, price required");
return;
}

const formData=new FormData();

formData.append("name",name);
formData.append("description",description);
formData.append("stock",stock);
formData.append("price",price);

if(imageInput.files[0]){
formData.append("image",imageInput.files[0]);
}

await fetch("/api/items",{
method:"POST",
body:formData,
credentials:"include"
});

document.getElementById("name").value="";
document.getElementById("description").value="";
document.getElementById("stock").value="";
document.getElementById("price").value="";
imageInput.value="";

loadItems();

};

/* INIT */

loadItems();

/* AUTO REFRESH */

setInterval(loadItems,5000);

});

</script>

</body>
</html>
