<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Items - Vaporia Inventory System</title>

<style>
/* ========================= BODY ========================= */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #d8c4ad;
    position: relative;
}

body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('vaporia.jpg');
    background-size: 400px auto;
    background-position: center;
    opacity: 0.25;
    z-index: -1;
}

/* ========================= TOPBAR ========================= */
.topbar {
    padding: 15px;
    background: rgba(193,168,142,0.9);
    display: flex;
    align-items: center;
    position: relative;
    z-index: 1;
}

.menu-btn {
    font-size: 26px;
    cursor: pointer;
    margin-right: 20px;
}

/* ========================= SIDEBAR ========================= */
.sidebar {
    position: fixed;
    left: -250px;
    top: 0;
    width: 250px;
    height: 100%;
    background: rgba(168,146,120,0.95);
    padding-top: 60px;
    transition: 0.3s;
    z-index: 9999;
}

.sidebar a {
    display: block;
    padding: 15px;
    text-decoration: none;
    color: #4b3a2a;
    font-size: 18px;
}

.sidebar a:hover {
    background: rgba(143,123,101,0.9);
    color: white;
}

.sidebar.active {
    left: 0;
}

/* ========================= MAIN ========================= */
.main {
    padding: 30px;
    position: relative;
    z-index: 1;
}

/* ========================= ADD ITEM ========================= */
.add-section {
    background: rgba(200,180,150,0.95);
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
}

.add-section input,
.add-section button {
    padding: 8px;
    border-radius: 5px;
    border: 1px solid #a88a78;
}

.add-section button {
    background: #4b3a2a;
    color: white;
    border: none;
    cursor: pointer;
}

/* ========================= ITEMS GRID ========================= */
.items-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
}

.item-card {
    width: 220px;
    background: rgba(200,180,150,0.95);
    padding: 15px;
    border-radius: 12px;
    text-align: center;
    flex-shrink: 0;
}

.item-card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 8px;
    display: block;
}

/* PRICE */
.price-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 4px;
    margin: 5px 0;
}

.item-card .item-price {
    width: 80%;
    padding: 5px;
    border-radius: 5px;
    border: 1px solid #aaa;
}

/* ACTION BUTTONS */
.item-actions button {
    margin: 5px;
    padding: 5px 10px;
    border: none;
    cursor: pointer;
    color: white;
    border-radius: 4px;
}

.save-btn { background: #2e86de; }
.delete-btn { background: #c0392b; }

/* ========================= SEARCH MODAL ========================= */
#openSearchModal {
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 1000;
    padding: 12px 15px;
    border-radius: 50px;
    background: #4b3a2a;
    color: white;
    cursor: pointer;
}

.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
    z-index: 10000;
}

.modal-content {
    background: #d8c4ad;
    padding: 20px;
    border-radius: 12px;
    width: 100%;
    max-width: 400px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.modal-content input {
    width: 90%;
    padding: 8px;
    margin-top: 10px;
    border-radius: 5px;
    border: 1px solid #aaa;
}

.modal-close {
    align-self: flex-end;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
    <div class="menu-btn">☰</div>
    <h2>Items</h2>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <a href="dashboard.html">Dashboard</a>
    <a href="items.html">Items</a>
    <a href="sales.html">Sales</a>
    <a href="reports.html">Reports</a>
    <a href="suppliers.html">Suppliers</a>
    <a href="#" id="logoutBtn">Logout</a>
</div>

<!-- MAIN -->
<div class="main">

    <div class="add-section">
        <input type="text" id="name" placeholder="Item Name">
        <input type="text" id="description" placeholder="Description">
        <input type="number" id="stock" placeholder="Stock">
        <input type="number" id="price" placeholder="Price">
        <input type="file" id="imageInput">
        <button onclick="addItem()">Add Item</button>
    </div>

    <h3>Available Items</h3>
    <div class="items-grid" id="itemsGrid"></div>

    <h3>Out of Stock</h3>
    <div class="items-grid" id="outOfStockGrid"></div>

</div>

<!-- SEARCH -->
<button id="openSearchModal">🔍</button>

<div class="modal" id="searchModal">
    <div class="modal-content">
        <span class="modal-close" id="closeSearchModal">&times;</span>
        <input type="text" id="searchInputModal" placeholder="Search items...">
    </div>
</div>

<script>
(async () => {
    try {
        const res = await fetch("/api/dashboard", { credentials: "include" });
        if (res.status === 401) {
            window.location.replace("login.html");
        }
    } catch (err) {
        console.error(err);
        window.location.replace("login.html");
    }
})();
</script>
<script>
document.addEventListener("DOMContentLoaded", () => {

    const sidebar = document.getElementById("sidebar");
    const menuBtn = document.querySelector(".menu-btn");
    const logoutBtn = document.getElementById("logoutBtn");

    const itemsGrid = document.getElementById("itemsGrid");
    const outOfStockGrid = document.getElementById("outOfStockGrid");

    const modal = document.getElementById("searchModal");
    const openModal = document.getElementById("openSearchModal");
    const closeModal = document.getElementById("closeSearchModal");
    const searchInput = document.getElementById("searchInputModal");

    // SIDEBAR
    menuBtn.onclick = e => {
        e.stopPropagation();
        sidebar.classList.toggle("active");
    };

    document.addEventListener("click", e => {
        if (!sidebar.contains(e.target) && !menuBtn.contains(e.target)) {
            sidebar.classList.remove("active");
        }
    });

    // LOGOUT
  if (logoutBtn) {
    logoutBtn.addEventListener("click", async e => {
      e.preventDefault();
      e.stopPropagation();
      try {
        const res = await fetch("/logout", { method: "POST", credentials: "include" });
        if (res.ok) window.location.replace("login.html");
        else console.error("Logout failed:", res.status);
      } catch (err) {
        console.error("Logout error:", err);
      }
    });
  }
    // SEARCH MODAL
    openModal.onclick = e => {
        e.stopPropagation();
        modal.style.display = "flex";
    };

    closeModal.onclick = e => {
        e.stopPropagation();
        modal.style.display = "none";
    };

    modal.onclick = e => {
        if (e.target === modal) modal.style.display = "none";
    };

    searchInput.addEventListener("input", e => {
        const val = e.target.value.toLowerCase();
        document.querySelectorAll(".item-card").forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(val) ? "" : "none";
        });
    });

    // LOAD ITEMS
    async function loadItems() {
        const res = await fetch("/api/items", { credentials: "include" });
        const items = await res.json();

        itemsGrid.innerHTML = "";
        outOfStockGrid.innerHTML = "";

        items.forEach(item => {
            const card = document.createElement("div");
            card.className = "item-card";

            card.innerHTML = `
                <img src="${item.image || 'https://via.placeholder.com/150'}">
                <p>${item.name}</p>
                <p>${item.description}</p>
                <div class="price-wrapper">
                    <span>₱</span>
                    <input type="number" class="item-price" value="${item.price}">
                </div>
                <p>Stock: ${item.stock}</p>
                <div class="item-actions">
                    <button class="save-btn">Save</button>
                    <button class="delete-btn">Delete</button>
                </div>
            `;

            // UPDATE
            card.querySelector(".save-btn").onclick = async () => {
                const price = card.querySelector(".item-price").value.trim();

                if (!price || isNaN(price)) {
                    alert("Invalid price");
                    return;
                }

                const res = await fetch("/api/items/" + item._id, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include",
                    body: JSON.stringify({ price: Number(price) })
                });

                if (!res.ok) {
                    alert("Update failed");
                    return;
                }

                loadItems();
            };

            // DELETE
            card.querySelector(".delete-btn").onclick = async () => {
                const res = await fetch("/api/items/" + item._id, {
                    method: "DELETE",
                    credentials: "include"
                });

                if (!res.ok) {
                    alert("Delete failed");
                    return;
                }

                loadItems();
            };

            if (item.stock > 0) itemsGrid.appendChild(card);
            else outOfStockGrid.appendChild(card);
        });
    }

    // ADD ITEM
    window.addItem = async () => {
        const name = document.getElementById("name").value.trim();
        const desc = document.getElementById("description").value.trim();
        const stock = document.getElementById("stock").value;
        const price = document.getElementById("price").value;
        const file = document.getElementById("imageInput").files[0];

        const form = new FormData();
        form.append("name", name);
        form.append("description", desc);
        form.append("stock", stock);
        form.append("price", price);

        if (file) form.append("image", file);

        await fetch("/api/items", {
            method: "POST",
            body: form,
            credentials: "include"
        });
        if (!res.ok) {
        const data = await res.json();
        alert(data.message || "Add failed");
        return;
        }

        loadItems();

        // CLEAR INPUTS
        document.getElementById("name").value = "";
        document.getElementById("description").value = "";
        document.getElementById("stock").value = "";
        document.getElementById("price").value = "";
        document.getElementById("imageInput").value = "";
    };

    loadItems();
});
</script>

</body>
</html>
