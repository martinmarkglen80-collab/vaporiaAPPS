<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Items - Vaporia Inventory System</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #d8c4ad;
    position: relative;
}

body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('vaporia.jpg');
    background-size: 400px auto;
    background-position: center top;
    opacity: 0.24;
    pointer-events: none;
    z-index: 0;
}

.topbar {
    padding: 15px;
    background: rgba(193,168,142,0.9);
    display: flex;
    align-items: center;
    position: relative;
    z-index: 1;
}

.menu-btn {
    font-size: 26px;
    cursor: pointer;
    margin-right: 20px;
}

.sidebar {
    position: fixed;
    left: -250px;
    top: 0;
    width: 250px;
    height: 100%;
    background: rgba(168,146,120,0.95);
    padding-top: 60px;
    transition: 0.3s;
    z-index: 9999;
}

.sidebar a {
    display: block;
    padding: 15px;
    text-decoration: none;
    color: #4b3a2a;
}

.sidebar.active {
    left: 0;
}

.main {
    padding: 30px;
    position: relative;
    z-index: 1;
}

.add-section {
    background: rgba(200,180,150,0.95);
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.add-section input, .add-section button {
    border-radius: 6px;
    border: 1px solid #aaa;
    padding: 8px;
}

.add-section button {
    background: #4b3a2a;
    color: white;
    border: none;
    cursor: pointer;
}

.items-grid {
    display: flex;
    overflow-x: auto;
    gap: 20px;
}

.item-card {
    min-width: 200px;
    background: rgba(200,180,150,0.95);
    padding: 15px;
    border-radius: 12px;
    text-align: center;
}

.item-card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 8px;
}

.item-actions button {
    margin: 5px;
    padding: 5px 10px;
    border: none;
    cursor: pointer;
    color: white;
}

.edit-btn { background: #2e86de; }
.delete-btn { background: #c0392b; }

#openSearchModal {
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 1000;
    padding: 12px 15px;
    border-radius: 50px;
    background: #4b3a2a;
    color: white;
    cursor: pointer;
}

.modal {
    display: none;              
    position: fixed;
    z-index: 10000;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);

    display: flex;             
    justify-content: center;   
    align-items: center;       
}

.modal-content {
    background: #d8c4ad;
    padding: 20px;
    border-radius: 12px;
    width: 90%;
    max-width: 400px;
    margin: 0;              
}

.modal-close {
    float: right;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="menu-btn">☰</div>
    <h2>Items</h2>
</div>

<div class="sidebar" id="sidebar">
    <a href="dashboard.html">Dashboard</a>
    <a href="items.html">Items</a>
    <a href="sales.html">Sales</a>
    <a href="reports.html">Reports</a>
    <a href="suppliers.html">Suppliers</a>
    <a href="#" id="logoutBtn">Logout</a>
</div>

<div class="main">

<div class="add-section">
    <input type="text" id="name" placeholder="Item Name">
    <input type="text" id="description" placeholder="Description">
    <input type="number" id="stock" placeholder="Stock">
    <input type="number" id="price" placeholder="Price">
    <input type="file" id="imageInput">
    <button onclick="addItem()">Add Item</button>
</div>

<h3>Available Items</h3>
<div class="items-grid" id="itemsGrid"></div>

<h3>Out of Stock</h3>
<div class="items-grid" id="outOfStockGrid"></div>

</div>

<button id="openSearchModal">🔍</button>

<div class="modal" id="searchModal">
<div class="modal-content">
<span class="modal-close" id="closeSearchModal">&times;</span>
<input type="text" id="searchInputModal" placeholder="Search items...">
</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const menuBtn = document.querySelector(".menu-btn");
const sidebar = document.getElementById("sidebar");

menuBtn.onclick = e => {
    e.stopPropagation();
    sidebar.classList.toggle("active");
};

document.addEventListener("click", () => {
    sidebar.classList.remove("active");
});

// LOGOUT
document.getElementById("logoutBtn").onclick = async () => {
    await fetch("/logout", { method:"POST", credentials:"include" });
    location.href = "login.html";
};

// SEARCH
const modal = document.getElementById("searchModal");
document.getElementById("openSearchModal").onclick = () => {
    modal.style.display="flex";
};
document.getElementById("closeSearchModal").onclick = () => {
    modal.style.display="none";
};

// SEARCH FUNCTIONALITY
document.getElementById("searchInputModal").addEventListener("input", e=>{
    const val = e.target.value.toLowerCase();
    document.querySelectorAll(".item-card").forEach(card=>{
        card.style.display = card.innerText.toLowerCase().includes(val) ? "" : "none";
    });
});

// LOAD ITEMS
async function loadItems(){
    const res = await fetch("/api/items",{credentials:"include"});
    const items = await res.json();

    const grid = document.getElementById("itemsGrid");
    const out = document.getElementById("outOfStockGrid");

    grid.innerHTML="";
    out.innerHTML="";

    items.forEach(item=>{
        const card = document.createElement("div");
        card.className="item-card";

        card.innerHTML=`
            <img src="${item.image ? item.image : 'https://via.placeholder.com/150'}">
            <h4>${item.name}</h4>
            <p>${item.description}</p>
            <p>Stock: ${item.stock}</p>
            <p>₱${item.price}</p>
            <div class="item-actions">
                <button class="edit-btn">Edit</button>
                <button class="delete-btn">Delete</button>
            </div>
        `;

        // DELETE
        card.querySelector(".delete-btn").onclick = async ()=>{
            const res = await fetch("/api/items/"+item._id,{
                method:"DELETE",
                credentials:"include"
            });
            if(!res.ok){ alert("Delete failed"); return; }
            loadItems();
        };

        // EDIT
        card.querySelector(".edit-btn").onclick = async ()=>{
            const name = prompt("New name", item.name);
            if(name===null) return;

            const desc = prompt("New description", item.description);
            if(desc===null) return;

            const price = prompt("New price", item.price);
            if(price===null || isNaN(price)) return;

            const res = await fetch("/api/items/"+item._id,{
                method:"PUT",
                headers:{"Content-Type":"application/json"},
                credentials:"include",
                body:JSON.stringify({
                    name,
                    description:desc,
                    price:Number(price)
                })
            });

            if(!res.ok){ alert("Update failed"); return; }

            loadItems();
        };

        if(item.stock>0) grid.appendChild(card);
        else out.appendChild(card);
    });
}

// ADD ITEM
window.addItem = async ()=>{
    const name=document.getElementById("name").value.trim();
    const desc=document.getElementById("description").value;
    const stock=document.getElementById("stock").value;
    const price=document.getElementById("price").value;
    const file=document.getElementById("imageInput").files[0];

    const form=new FormData();
    form.append("name",name);
    form.append("description",desc);
    form.append("stock",stock);
    form.append("price",price);
    if(file) form.append("image",file);

    await fetch("/api/items",{method:"POST",body:form,credentials:"include"});

    loadItems();
};

loadItems();

});
</script>

</body>
</html>
