<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports - Vaporia</title>

<style>

/* BODY */

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#d8c4ad;
position:relative;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:url('vaporia.jpg');
background-size:400px auto;
background-position:center;
opacity:0.25;
z-index:-1;
}

/* TOPBAR */

.topbar{
padding:15px;
background:rgba(193,168,142,0.9);
display:flex;
align-items:center;
}

.menu-btn{
font-size:26px;
cursor:pointer;
margin-right:20px;
}

/* SIDEBAR */

.sidebar{
position:fixed;
left:-250px;
top:0;
width:250px;
height:100%;
background:rgba(168,146,120,0.95);
padding-top:60px;
transition:0.3s;
z-index:9999;
}

.sidebar a{
display:block;
padding:15px;
text-decoration:none;
color:#4b3a2a;
font-size:18px;
}

.sidebar a:hover{
background:rgba(143,123,101,0.9);
color:white;
}

.sidebar.active{
left:0;
}

/* MAIN */

.main{
padding:30px;
position:relative;
}

/* ADD SECTION */

.add-section{
background:rgba(200,180,150,0.95);
padding:20px;
border-radius:12px;
margin-bottom:20px;
display:flex;
flex-wrap:wrap;
gap:10px;
align-items:center;
}

.add-section input{
padding:8px;
border-radius:5px;
border:1px solid #a88a78;
}

.add-section button{
padding:8px 15px;
background:#4b3a2a;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.add-section button:hover{
background:#2e1f13;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
background:#d8c4ad;
}

th,td{
border:2px solid #6b5a48;
padding:10px;
text-align:center;
}

th{
background:#b9a68d;
}

.delete-btn{
background:#c0392b;
color:white;
padding:5px 10px;
border:none;
border-radius:4px;
cursor:pointer;
}

.delete-btn:hover{
background:#7b241c;
}

.report-name{
width:90%;
padding:4px;
border-radius:4px;
border:1px solid #a88a78;
}

</style>
</head>

<body>

<!-- TOPBAR -->

<div class="topbar">
<div class="menu-btn">☰</div>
<h2>Reports</h2>
</div>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">
<a href="dashboard.html">Dashboard</a>
<a href="items.html">Items</a>
<a href="sales.html">Sales</a>
<a href="reports.html">Reports</a>
<a href="suppliers.html">Suppliers</a>
<a href="#" id="logoutBtn">Logout</a>
</div>

<!-- MAIN -->

<div class="main">

<div class="add-section">
<input type="text" id="reportName" placeholder="Report Name">
<button onclick="addReport()">Add Report</button>
</div>

<table>
<thead>
<tr>
<th>ID</th>
<th>Report Name</th>
<th>Report Date</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="reportsTable"></tbody>

</table>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  // =========================
  // ELEMENTS
  // =========================
  const tbody = document.getElementById("reportsTable");
  const sidebar = document.getElementById("sidebar");
  const menuBtn = document.querySelector(".menu-btn");
  const logoutBtn = document.getElementById("logoutBtn");

  // =========================
  // SIDEBAR TOGGLE
  // =========================
  menuBtn.addEventListener("click", e => {
    e.stopPropagation();
    sidebar.classList.toggle("active");
  });

  document.addEventListener("click", e => {
    if (!sidebar.contains(e.target) && !menuBtn.contains(e.target)) {
      sidebar.classList.remove("active");
    }
  });

  // =========================
  // LOGOUT
  // =========================
  logoutBtn.addEventListener("click", async e => {
    e.preventDefault();
    await fetch("/logout", {
      method: "POST",
      credentials: "include"
    });
    window.location.replace("login.html");
  });

  // =========================
  // LOAD REPORTS
  // =========================
  async function loadReports() {
    try {
      const res = await fetch("/api/reports", {
        credentials: "include"
      });

      if (!res.ok) throw new Error("Failed to fetch reports");

      const reports = await res.json();
      tbody.innerHTML = "";

      reports.forEach(r => {
        const tr = document.createElement("tr");
        const date = new Date(r.date).toLocaleDateString();
        const isRefund = r.type === "refund";

        tr.innerHTML = `
          <td>${r._id}</td>
          <td>
            <input type="text" value="${r.name}" class="report-name"
            ${isRefund ? "disabled" : ""}>
          </td>
          <td>${date}</td>
          <td>
            ${isRefund ? "Locked" : "<button class='delete-btn'>Delete</button>"}
          </td>
        `;

        // =========================
        // DELETE REPORT
        // =========================
        if (!isRefund) {
          tr.querySelector(".delete-btn").addEventListener("click", async () => {
            if (!confirm("Delete this report?")) return;

            await fetch(`/api/reports/${r._id}`, {
              method: "DELETE",
              credentials: "include"
            });

            loadReports();
          });

          // =========================
          // UPDATE REPORT NAME
          // =========================
          tr.querySelector(".report-name").addEventListener("change", async () => {
            const name = tr.querySelector(".report-name").value.trim();
            if (!name) return;

            await fetch(`/api/reports/${r._id}`, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ name }),
              credentials: "include"
            });
          });
        }

        tbody.appendChild(tr);
      });

    } catch (err) {
      console.error("Error loading reports:", err);
    }
  }

  // =========================
  // ADD REPORT
  // =========================
  async function addReport() {
    const nameInput = document.getElementById("reportName");
    const name = nameInput.value.trim();

    if (!name) {
      alert("Report name required");
      return;
    }

    await fetch("/api/reports", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name }),
      credentials: "include"
    });

    nameInput.value = "";
    loadReports();
  }

  // Make function available to button
  window.addReport = addReport;

  // =========================
  // INITIAL LOAD
  // =========================
  loadReports();

});
</script>

</body>
</html>
