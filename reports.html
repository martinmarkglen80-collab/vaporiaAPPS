<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports - Vaporia</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #d8c4ad;
}
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('vaporia.jpg');
    background-size: 400px auto;
    background-position: center;
    opacity: 0.25;
    z-index: -1;
}
.sidebar {
    position: fixed;
    left: 0;
    top: 0;
    width: 250px;
    height: 100%;
    background: #b9a68d;
    padding-top: 40px;
    border-right: 3px solid #333;
}
.sidebar h2 {
    text-align: center;
    margin-bottom: 40px;
}
.sidebar a {
    display: block;
    padding: 20px;
    font-size: 22px;
    text-decoration: none;
    color: black;
    border-bottom: 1px solid rgba(0,0,0,0.2);
}
.sidebar a:hover { background: #a8957b; }
.logout {
    position: absolute;
    bottom: 30px;
    left: 40px;
    padding: 10px 30px;
    border: 2px solid #333;
    background: #cbb89e;
    cursor: pointer;
}
.main {
    margin-left: 270px;
    padding: 40px;
}
.add-btn {
    padding: 12px 30px;
    background: #cbb89e;
    border: 2px solid #333;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 20px;
}
table {
    width: 100%;
    border-collapse: collapse;
    background: #d8c4ad;
}
th, td {
    border: 2px solid #6b5a48;
    padding: 15px;
    text-align: center;
}
th { background: #b9a68d; }
.edit-btn {
    background: #2e86de;
    color: white;
    padding: 5px 8px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}
.edit-btn:hover { background: #1b4f72; }
.delete-btn {
    background: #c0392b;
    color: white;
    padding: 5px 8px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}
.delete-btn:hover { background: #7b241c; }
.inline-input { width: 80%; padding: 4px; border-radius: 4px; border: 1px solid #a88a78; margin: 2px 0; }
.inline-save { background: #27ae60; padding: 4px 8px; border: none; color: white; }
.inline-cancel { background: #c0392b; padding: 4px 8px; border: none; color: white; }
</style>
</head>
<body>

<div class="sidebar">
<h2>Dashboard</h2>
<a href="dashboard.html">Dashboard</a>
<a href="items.html">Items</a>
<a href="sales.html">Sales</a>
<a href="reports.html">Reports</a>
<a href="suppliers.html">Suppliers</a>
<button class="logout" id="logoutBtn">Logout</button>
</div>

<div class="main">
<button class="add-btn" onclick="showAdd()">Add Report</button>

<table>
<thead>
<tr>
<th>ID</th>
<th>Report Name</th>
<th>Report Date</th>
<th>Action</th>
</tr>
</thead>
<tbody id="reportsTable"></tbody>
</table>
</div>

<script>
let reports = [];

async function loadReports() {
    const res = await fetch("/api/reports", { credentials: "include" });
    reports = await res.json();
    const tbody = document.getElementById("reportsTable");
    tbody.innerHTML = "";
    reports.forEach((r, i) => {
        const tr = document.createElement("tr");
        tr.id = r._id;
        tr.innerHTML = `
            <td>${i+1}</td>
            <td>${r.name}</td>
            <td>${new Date(r.createdAt || r.date).toLocaleString()}</td>
            <td>
                <button class="edit-btn" onclick="editReport('${r._id}')">Edit</button>
                <button class="delete-btn" onclick="deleteReport('${r._id}')">Delete</button>
            </td>
        `;
        tbody.appendChild(tr);
    });
}

function showAdd() {
    const name = prompt("Enter report name:");
    if (name) addReport(name);
}

async function addReport(name) {
    await fetch("/api/reports", {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name })
    });
    loadReports();
}

function editReport(id) {
    const report = reports.find(r => r._id === id);
    const newName = prompt("Edit report name:", report.name);
    if (newName) saveReport(id, newName);
}

async function saveReport(id, name) {
    await fetch(`/api/reports/${id}`, {
        method: "PUT",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name })
    });
    loadReports();
}

async function deleteReport(id) {
    if (!confirm("Delete this report?")) return;
    await fetch(`/api/reports/${id}`, {
        method: "DELETE",
        credentials: "include"
    });
    loadReports();
}

// Logout
document.getElementById("logoutBtn").addEventListener("click", async () => {
    await fetch("/logout", { method: "POST", credentials: "include" });
    window.location = "login.html";
});

loadReports();
</script>

</body>
</html>
