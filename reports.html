<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports - Vaporia</title>

<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:#d8c4ad;position:relative;}
body::before{content:"";position:fixed;width:100%;height:100%;background:url('vaporia.jpg');background-size:400px auto;background-position:center;opacity:0.25;z-index:-1;}
.topbar{padding:15px;background:rgba(193,168,142,0.9);display:flex;align-items:center;}
.menu-btn{font-size:26px;cursor:pointer;margin-right:20px;}

.sidebar{
position:fixed;
left:-250px;
top:0;
width:250px;
height:100%;
background:rgba(168,146,120,0.95);
padding-top:60px;
transition:0.3s;
z-index:9999;
}

.sidebar a{
display:block;
padding:15px;
text-decoration:none;
color:#4b3a2a;
font-size:18px;
}

.sidebar a:hover{
background:rgba(143,123,101,0.9);
color:white;
}

.sidebar.active{left:0;}

.main{padding:30px;}

.add-section{
background:rgba(200,180,150,0.95);
padding:20px;
border-radius:12px;
margin-bottom:20px;
display:flex;
gap:10px;
align-items:center;
}

.add-section input{
padding:8px;
border-radius:5px;
border:1px solid #a88a78;
}

.add-section button{
padding:8px 15px;
background:#4b3a2a;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.add-section button:hover{
background:#2e1f13;
}

table{
width:100%;
border-collapse:collapse;
background:#d8c4ad;
}

th,td{
border:2px solid #6b5a48;
padding:10px;
text-align:center;
}

th{background:#b9a68d;}

.delete-btn{
background:#c0392b;
color:white;
padding:5px 10px;
border:none;
border-radius:4px;
cursor:pointer;
}

.delete-btn:hover{
background:#7b241c;
}
</style>
</head>

<body>

<div class="topbar">
<div class="menu-btn">☰</div>
<h2>Reports</h2>
</div>

<div class="sidebar" id="sidebar">
<a href="dashboard.html">Dashboard</a>
<a href="items.html">Items</a>
<a href="sales.html">Sales</a>
<a href="reports.html">Reports</a>
<a href="suppliers.html">Suppliers</a>
<a href="#" id="logoutBtn">Logout</a>
</div>

<div class="main">

<div class="add-section">
<input type="text" id="reportName" placeholder="Report Name">
<button onclick="addReport()">Add Report</button>
</div>

<table>
<thead>
<tr>
<th>ID</th>
<th>Report Name</th>
<th>Date</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="reportsTable"></tbody>
</table>

</div>

<script>

document.addEventListener("DOMContentLoaded",()=>{

const sidebar=document.getElementById("sidebar");
const menuBtn=document.querySelector(".menu-btn");
const logoutBtn=document.getElementById("logoutBtn");
const reportsTable=document.getElementById("reportsTable");

/* SIDEBAR */

menuBtn.onclick=e=>{
e.stopPropagation();
sidebar.classList.toggle("active");
};

document.addEventListener("click",e=>{
if(!sidebar.contains(e.target)&&!menuBtn.contains(e.target)){
sidebar.classList.remove("active");
}
});

/* LOGOUT */

logoutBtn.onclick=async e=>{
e.preventDefault();
await fetch("/logout",{method:"POST",credentials:"include"});
window.location="login.html";
};

/* LOAD REPORTS */

async function loadReports(){

const res=await fetch("/api/reports",{credentials:"include"});
const reports=await res.json();

reportsTable.innerHTML="";

reports.forEach((r,index)=>{

const tr=document.createElement("tr");

const date=new Date(r.date).toLocaleDateString();

tr.innerHTML=`
<td>${index+1}</td>
<td><input type="text" value="${r.name}" class="report-name"></td>
<td>${date}</td>
<td><button class="delete-btn">Delete</button></td>
`;

tr.querySelector(".delete-btn").onclick=async()=>{

await fetch(`/api/reports/${r._id}`,{
method:"DELETE",
credentials:"include"
});

loadReports();

};

tr.querySelector(".report-name").onchange=async()=>{

const name=tr.querySelector(".report-name").value;

await fetch(`/api/reports/${r._id}`,{

method:"PUT",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({name}),

credentials:"include"

});

};

reportsTable.appendChild(tr);

});

}

/* ADD REPORT */

window.addReport=async()=>{

const name=document.getElementById("reportName").value.trim();

if(!name){
alert("Report name required");
return;
}

await fetch("/api/reports",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({name}),

credentials:"include"

});

document.getElementById("reportName").value="";

loadReports();

};

/* INIT */

loadReports();

});

</script>

</body>
</html>
