<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports - Vaporia</title>

<style>

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#d8c4ad;
    position:relative;
}

/* Background */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:url('vaporia.jpg');
    background-size:400px auto;
    background-position:center;
    opacity:0.25;
    z-index:-1;
}

/* Topbar */
.topbar{
    padding:15px;
    background:rgba(193,168,142,0.9);
    display:flex;
    align-items:center;
    position:relative;
}

.menu-btn{
    font-size:26px;
    cursor:pointer;
    margin-right:20px;
}

/* Sidebar */
.sidebar{
    position:fixed;
    left:-250px;
    top:0;
    width:250px;
    height:100%;
    background:rgba(168,146,120,0.95);
    padding-top:60px;
    transition:0.3s;
    z-index:9999;
}

.sidebar a{
    display:block;
    padding:15px;
    text-decoration:none;
    color:#4b3a2a;
    font-size:18px;
}

.sidebar a:hover{
    background:rgba(143,123,101,0.9);
    color:white;
}

.sidebar.active{
    left:0;
}

/* Main Content */
.main{
    padding:30px;
    position:relative;
}

/* Add Section */
.add-section{
    background:rgba(200,180,150,0.95);
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
}

.add-section input{
    padding:8px;
    border-radius:5px;
    border:1px solid #a88a78;
}

.add-section button{
    padding:8px 15px;
    background:#4b3a2a;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.add-section button:hover{
    background:#2e1f13;
}

/* Table */
table{
    width:100%;
    border-collapse:collapse;
    background:#d8c4ad;
}

th,td{
    border:2px solid #6b5a48;
    padding:10px;
    text-align:center;
}

th{
    background:#b9a68d;
}
.delete-btn { background: #c0392b; }

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <div class="menu-btn">☰</div>
    <h2>Reports</h2>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <a href="dashboard.html">Dashboard</a>
    <a href="items.html">Items</a>
    <a href="sales.html">Sales</a>
    <a href="reports.html">Reports</a>
    <a href="suppliers.html">Suppliers</a>
    <a href="#" id="logoutBtn">Logout</a>
</div>

<!-- MAIN CONTENT -->
<div class="main">

    <div class="add-section">
        <input type="text" id="reportName" placeholder="Report Name">
        <button onclick="addReport()">Add Report</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Report Name</th>
                <th>Report Date</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody id="reportsTable"></tbody>
    </table>

</div>

<script>

/* =========================
   SIDEBAR
========================= */

const sidebar = document.getElementById("sidebar");
const menuBtn = document.querySelector(".menu-btn");
const logoutBtn = document.getElementById("logoutBtn");

menuBtn.onclick = e => {
    e.stopPropagation();
    sidebar.classList.toggle("active");
};

document.addEventListener("click", e => {
    if (!sidebar.contains(e.target) && !menuBtn.contains(e.target)){
        sidebar.classList.remove("active");
    }
});

/* =========================
   LOGOUT
========================= */

logoutBtn.onclick = async e => {
    e.preventDefault();
    await fetch("/logout",{method:"POST",credentials:"include"});
    window.location="login.html";
};

/* =========================
   LOAD REPORTS
========================= */

async function loadReports(){

    const res = await fetch("/api/reports",{credentials:"include"});
    const reports = await res.json();

    const tbody = document.getElementById("reportsTable");
    tbody.innerHTML = "";

    reports.forEach(r => {

        const tr = document.createElement("tr");
        const date = new Date(r.date).toLocaleDateString();

        tr.innerHTML = `
        <td>${r._id}</td>

        <td>
            <input type="text"
            value="${r.name}"
            onchange="updateReport('${r._id}', this.value)">
        </td>

        <td>${date}</td>

        <td>
            <button onclick="deleteReport('${r._id}')">Delete</button>
        </td>
        `;

        tbody.appendChild(tr);
    });
}

/* =========================
   ADD REPORT
========================= */

async function addReport(){

    const name = document.getElementById("reportName").value;

    if(!name){
        alert("Report name required");
        return;
    }

    await fetch("/api/reports",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({ name }),
        credentials:"include"
    });

    document.getElementById("reportName").value="";
    loadReports();
}

/* =========================
   UPDATE REPORT
========================= */

async function updateReport(id,name){

    await fetch("/api/reports/"+id,{
        method:"PUT",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({ name }),
        credentials:"include"
    });

}

/* =========================
   DELETE REPORT
========================= */

async function deleteReport(id){

    if(!confirm("Delete report?")) return;

    await fetch("/api/reports/"+id,{
        method:"DELETE",
        credentials:"include"
    });

    loadReports();
}

/* =========================
   INITIAL LOAD
========================= */

loadReports();

</script>

</body>
</html>
