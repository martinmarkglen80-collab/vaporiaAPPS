<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports - Vaporia</title>
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #d8c4ad;
}
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('vaporia.jpg');
    background-size: 400px auto;
    background-position: center;
    opacity: 0.25;
    z-index: -1;
}
.sidebar {
    position: fixed;
    left: 0;
    top: 0;
    width: 250px;
    height: 100%;
    background: #b9a68d;
    padding-top: 40px;
    border-right: 3px solid #333;
}
.sidebar h2 {
    text-align: center;
    margin-bottom: 40px;
}
.sidebar a {
    display: block;
    padding: 20px;
    font-size: 22px;
    text-decoration: none;
    color: black;
    border-bottom: 1px solid rgba(0,0,0,0.2);
}
.sidebar a:hover {
    background: #a8957b;
}
.logout {
    position: absolute;
    bottom: 30px;
    left: 40px;
    padding: 10px 30px;
    border: 2px solid #333;
    background: #cbb89e;
    cursor: pointer;
}
.main {
    margin-left: 270px;
    padding: 40px;
}
.add-btn {
    padding: 12px 30px;
    background: #cbb89e;
    border: 2px solid #333;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 20px;
}
table {
    width: 100%;
    border-collapse: collapse;
    background: #d8c4ad;
}
th, td {
    border: 2px solid #6b5a48;
    padding: 15px;
    text-align: center;
}
th {
    background: #b9a68d;
}
.search-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #cbb89e;
    border: 2px solid #333;
    padding: 10px 15px;
    cursor: pointer;
    font-size: 22px;
}
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
}
.modal-content {
    background: #d8c4ad;
    padding: 30px;
    border-radius: 10px;
    width: 300px;
    text-align: center;
}
.modal-content input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}
.close {
    float: right;
    cursor: pointer;
    font-size: 22px;
}
</style>
</head>
<body>

<div class="sidebar">
    <h2>Dashboard</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="items.html">Items</a>
    <a href="sales.html">Sales</a>
    <a href="reports.html">Reports</a>    
    <a href="suppliers.html">Suppliers</a>
    <a href="#" id="logoutBtn">Logout</a>
</div>

<div class="main">
    <button class="add-btn" onclick="addReport()">ADD REPORT</button>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Report Name</th>
                <th>Report Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="reportsTable"></tbody>
    </table>
</div>

<button class="search-btn" onclick="openSearch()">🔍</button>

<div class="modal" id="searchModal">
    <div class="modal-content">
        <span class="close" onclick="closeSearch()">×</span>
        <h3>Search Report</h3>
        <input type="text" id="searchInputModal" placeholder="Search report..." oninput="filterReports()">
    </div>
</div>

<script>
const sidebar = document.getElementById("sidebar");
const logoutBtn = document.getElementById("logoutBtn");

logoutBtn.onclick = async e => {
    e.preventDefault();
    await fetch("/logout", { method: "POST", credentials: "include" });
    window.location = "login.html";
};

let allReports = [];

// Load reports
async function loadReports() {
    const res = await fetch("/api/reports", { credentials: "include" });
    allReports = await res.json();
    renderReports(allReports);
}

// Render reports in table
function renderReports(data) {
    const tbody = document.getElementById("reportsTable");
    tbody.innerHTML = "";
    data.forEach((r, i) => {
        const tr = document.createElement("tr");
        const date = new Date(r.createdAt || Date.now());
        tr.innerHTML = `
            <td>${i + 1}</td>
            <td>${r.name}</td>
            <td>${date.toLocaleString()}</td>
            <td>
                <button onclick="editReport('${r._id}')">Edit</button>
                <button onclick="deleteReport('${r._id}')">Delete</button>
            </td>
        `;
        tbody.appendChild(tr);
    });
}

// Add report
function addReport() {
    const name = prompt("Enter report name:");
    if (!name) return;
    fetch("/api/reports", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name }),
        credentials: "include"
    }).then(() => loadReports());
}

// Edit report
function editReport(id) {
    const newName = prompt("Enter new report name:");
    if (!newName) return;
    fetch(`/api/reports/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: newName }),
        credentials: "include"
    }).then(() => loadReports());
}

// Delete report
function deleteReport(id) {
    if (!confirm("Delete this report?")) return;
    fetch(`/api/reports/${id}`, {
        method: "DELETE",
        credentials: "include"
    }).then(() => loadReports());
}

// Search modal
function openSearch() { document.getElementById("searchModal").style.display = "flex"; }
function closeSearch() { document.getElementById("searchModal").style.display = "none"; }
function filterReports() {
    const term = document.getElementById("searchInputModal").value.toLowerCase();
    const filtered = allReports.filter(r => r.name.toLowerCase().includes(term));
    renderReports(filtered);
}

// Initial load
loadReports();
</script>

</body>
</html>
