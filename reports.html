<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports - Vaporia Inventory System</title>
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #d8c4ad;
    position: relative;
}
body::before {
    content: "";
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: url('vaporia.jpg');
    background-size: 400px auto;
    background-position: center top;
    opacity:0.24;
    pointer-events: none;
    z-index: 0;
}

/* Topbar */
.topbar {
    padding:15px;
    background: rgba(193,168,142,0.9);
    display:flex;
    align-items:center;
    z-index:1;
    position: relative;
}
.menu-btn { font-size:26px; cursor:pointer; margin-right:20px; }

/* Sidebar */
.sidebar {
    position: fixed;
    left: -250px; top:0;
    width:250px; height:100%;
    background: rgba(168,146,120,0.95);
    padding-top:60px;
    transition:0.3s;
    z-index:9999;
}
.sidebar a {
    display:block;
    padding:15px;
    text-decoration:none;
    color:#4b3a2a;
    font-size:18px;
}
.sidebar a:hover { background: rgba(143,123,101,0.9); color:white; }
.sidebar.active { left:0; }

/* Main */
.main { padding:30px; position:relative; z-index:1; }

/* Add Section */
.add-section {
    background: rgba(200,180,150,0.95);
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
}
.add-section input {
    padding:8px; border-radius:5px; border:1px solid #a88a78;
}
.add-section button {
    padding:8px 15px;
    background:#4b3a2a;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
.add-section button:hover { background:#2e1f13; }

/* Table */
.table-container {
    overflow-x:auto;
    background: rgba(200,180,150,0.95);
    padding:15px;
    border-radius:12px;
}
table {
    width:100%;
    border-collapse: collapse;
}
th, td {
    padding:10px;
    border-bottom:1px solid #a88a78;
    text-align:center;
}
th { background: rgba(193,168,142,0.9); }
.edit-btn { background:#2e86de; color:white; padding:5px 10px; border:none; border-radius:4px; cursor:pointer; }
.delete-btn { background:#c0392b; color:white; padding:5px 10px; border:none; border-radius:4px; cursor:pointer; }
.inline-input { width:90%; padding:4px; border-radius:4px; border:1px solid #a88a78; }

/* Modal Search */
#openSearchModal {
    position:fixed;
    bottom:30px;
    right:30px;
    z-index:1000;
    padding:12px 15px;
    border:none;
    border-radius:50px;
    background:#4b3a2a;
    color:white;
    font-size:18px;
    cursor:pointer;
}
.modal {
    display:none;
    position:fixed;
    z-index:10000;
    left:0; top:0;
    width:100%; height:100%;
    background-color:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
}
.modal-content {
    background:#d8c4ad;
    padding:20px;
    border-radius:12px;
    width:90%;
    max-width:400px;
    position:relative;
    display:flex;
    flex-direction:column;
    gap:10px;
}
.modal-close {
    position:absolute;
    top:5px; right:10px;
    font-size:22px;
    cursor:pointer;
}
.modal-content input {
    width:100%;
    padding:8px;
    border-radius:5px;
    border:1px solid #a88a78;
}
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
    <div class="menu-btn">☰</div>
    <h2>Reports</h2>
</div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <a href="dashboard.html">Dashboard</a>
    <a href="items.html">Items</a>
    <a href="sales.html">Sales</a>
    <a href="reports.html">Reports</a>
    <a href="#" id="logoutBtn">Logout</a>
</div>

<!-- Main -->
<div class="main">

<div class="add-section">
<input type="text" id="reportTitle" placeholder="Report Title">
<input type="text" id="reportDesc" placeholder="Description">
<button onclick="addReport()">Add Report</button>
</div>

<div class="table-container">
<table id="reportsTable">
<thead>
<tr>
<th>Title</th>
<th>Description</th>
<th>Actions</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<button id="openSearchModal">🔍</button>
<div class="modal" id="searchModal">
<div class="modal-content">
<span class="modal-close" id="closeSearchModal">&times;</span>
<input type="text" id="searchInputModal" placeholder="Search reports..." oninput="filterReports()">
</div>
</div>

<script>
let allReports=[];

/* Sidebar */
const sidebar = document.getElementById("sidebar");
document.querySelector(".menu-btn").addEventListener("click", e=>{
    e.stopPropagation();
    sidebar.classList.toggle("active");
});
document.addEventListener("click", e=>{
    if(!sidebar.contains(e.target)&&!document.querySelector(".menu-btn").contains(e.target)) sidebar.classList.remove("active");
});

/* Logout */
document.getElementById("logoutBtn").addEventListener("click", async e=>{
    e.preventDefault();
    await fetch("/logout",{method:"POST",credentials:"include"});
    window.location="login.html";
});

/* Modal Search */
const searchModal=document.getElementById("searchModal");
document.getElementById("openSearchModal").onclick=()=> searchModal.style.display="flex";
document.getElementById("closeSearchModal").onclick=()=> searchModal.style.display="none";
window.onclick=e=>{ if(e.target==searchModal) searchModal.style.display="none"; }

/* Load Reports */
async function loadReports(){
    const res = await fetch("/api/reports",{credentials:"include"});
    allReports = await res.json();
    renderReports(allReports);
}

/* Render Table */
function renderReports(reports){
    const tbody = document.querySelector("#reportsTable tbody");
    tbody.innerHTML="";
    reports.forEach(rep=>{
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${rep.title}</td>
            <td>${rep.description}</td>
            <td>
                <button class="edit-btn" onclick="editReport('${rep._id}', this)">Edit</button>
                <button class="delete-btn" onclick="deleteReport('${rep._id}')">Delete</button>
            </td>
        `;
        tbody.appendChild(tr);
    });
}

/* Add Report */
async function addReport(){
    const title=document.getElementById("reportTitle").value;
    const desc=document.getElementById("reportDesc").value;
    if(!title){ alert("Title required"); return; }

    await fetch("/api/reports",{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({title, description:desc})
    });

    document.getElementById("reportTitle").value="";
    document.getElementById("reportDesc").value="";
    loadReports();
}

/* Delete Report */
async function deleteReport(id){
    if(!confirm("Delete this report?")) return;
    await fetch(`/api/reports/${id}`,{method:"DELETE"});
    loadReports();
}

/* Search Filter */
function filterReports(){
    const term=document.getElementById("searchInputModal").value.toLowerCase();
    renderReports(allReports.filter(r=> r.title.toLowerCase().includes(term) || r.description.toLowerCase().includes(term)));
}

loadReports();
</script>

</body>
</html>
