<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suppliers - Vaporia</title>
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #d8c4ad;
    position: relative;
}
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('vaporia.jpg');
    background-size: 400px auto;
    background-position: center;
    opacity: 0.25;
    z-index: -1;
}
.topbar {
    padding: 15px;
    background: rgba(193,168,142,0.9);
    display: flex;
    align-items: center;
    z-index: 1;
    position: relative;
}
.menu-btn {
    font-size: 26px;
    cursor: pointer;
    margin-right: 20px;
}
.sidebar {
    position: fixed;
    left: -250px;
    top: 0;
    width: 250px;
    height: 100%;
    background: rgba(168,146,120,0.95);
    padding-top: 60px;
    transition: 0.3s;
    z-index: 9999;
}
.sidebar a {
    display: block;
    padding: 15px;
    text-decoration: none;
    color: #4b3a2a;
    font-size: 18px;
}
.sidebar a:hover {
    background: rgba(143,123,101,0.9);
    color: white;
}
.sidebar.active {
    left: 0;
}
.main {
    padding: 30px;
    position: relative;
    z-index: 1;
}
.add-section {
    background: rgba(200,180,150,0.95);
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
}
.add-section input {
    padding: 8px;
    border-radius: 5px;
    border: 1px solid #a88a78;
}
.add-section button {
    padding: 8px 15px;
    background: #4b3a2a;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
.add-section button:hover {
    background: #2e1f13;
}
table {
    width: 100%;
    border-collapse: collapse;
    background: #d8c4ad;
}
th, td {
    border: 2px solid #6b5a48;
    padding: 10px;
    text-align: center;
}
th {
    background: #b9a68d;
}
.delete-btn { background: #c0392b; }
</style>
</head>
<body>

<div class="topbar">
    <div class="menu-btn">☰</div>
    <h2>Suppliers</h2>
</div>

<div class="sidebar" id="sidebar">
    <a href="dashboard.html">Dashboard</a>
    <a href="items.html">Items</a>
    <a href="sales.html">Sales</a>
    <a href="reports.html">Reports</a> 
    <a href="suppliers.html">Suppliers</a>
    <a href="#" id="logoutBtn">Logout</a>
</div>

<div class="main">
    <div class="add-section">
        <input type="text" id="supplierName" placeholder="Supplier Name">
        <input type="text" id="supplierContact" placeholder="Contact">
        <button onclick="addSupplier()">Add Supplier</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Contact</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="suppliersTable"></tbody>
    </table>
</div>

<script>
const sidebar = document.getElementById("sidebar");
const menuBtn = document.querySelector(".menu-btn");
const logoutBtn = document.getElementById("logoutBtn");

menuBtn.onclick = e => {
    e.stopPropagation();
    sidebar.classList.toggle("active");
};

document.addEventListener("click", e => {
    if (!sidebar.contains(e.target) && !menuBtn.contains(e.target)) {
        sidebar.classList.remove("active");
    }
});

logoutBtn.onclick = async e => {
    e.preventDefault();
    await fetch("/logout", { method: "POST", credentials: "include" });
    window.location = "login.html";
};

// Load suppliers from API
async function loadSuppliers() {
    const res = await fetch("/api/suppliers", { credentials: "include" });
    const suppliers = await res.json();
    const tbody = document.getElementById("suppliersTable");
    tbody.innerHTML = "";

    suppliers.forEach(s => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${s._id}</td>
            <td>
                <input type="text" value="${s.name}" onchange="updateSupplier('${s._id}', this.value, this.parentElement.nextElementSibling.children[0].value)">
            </td>
            <td>
                <input type="text" value="${s.contact}" onchange="updateSupplier('${s._id}', this.parentElement.previousElementSibling.children[0].value, this.value)">
            </td>
            <td>
                <button onclick="deleteSupplier('${s._id}')">Delete</button>
            </td>
        `;
        tbody.appendChild(tr);
    });
}

// Add supplier
async function addSupplier() {
    const name = document.getElementById("supplierName").value;
    const contact = document.getElementById("supplierContact").value;
    if (!name) { alert("Supplier name is required"); return; }

    const res = await fetch("/api/suppliers", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, contact }),
        credentials: "include"
    });

    if (!res.ok) { alert((await res.json()).message); return; }

    document.getElementById("supplierName").value = "";
    document.getElementById("supplierContact").value = "";
    loadSuppliers();
}

// Update supplier
async function updateSupplier(id, name, contact) {
    await fetch(`/api/suppliers/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, contact }),
        credentials: "include"
    });
    loadSuppliers();
}

// Delete supplier
async function deleteSupplier(id) {
    if (!confirm("Are you sure you want to delete this supplier?")) return;
    await fetch(`/api/suppliers/${id}`, {
        method: "DELETE",
        credentials: "include"
    });
    loadSuppliers();
}

// Initial load
loadSuppliers();
</script>

</body>
</html>
