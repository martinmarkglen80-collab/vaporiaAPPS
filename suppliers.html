<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suppliers - Vaporia Inventory System</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #d8c4ad;
    position: relative;
}
body::before {
    content: "";
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: url('vaporia.jpg');
    background-size: 400px auto;
    background-position: center top;
    opacity: 0.25;
    pointer-events: none;
    z-index: 0;
}

/* Topbar */
.topbar {
    padding: 15px;
    background: rgba(193,168,142,0.9);
    display: flex;
    align-items: center;
    position: relative;
    z-index: 1;
}
.menu-btn {
    font-size: 26px;
    cursor: pointer;
    margin-right: 20px;
}

/* Sidebar */
.sidebar {
    position: fixed;
    left: -250px;
    top: 0;
    width: 250px;
    height: 100%;
    background: rgba(168,146,120,0.95);
    padding-top: 60px;
    transition: 0.3s;
    z-index: 9999;
}
.sidebar a {
    display: block;
    padding: 15px;
    text-decoration: none;
    color: #4b3a2a;
    font-size: 18px;
}
.sidebar a:hover {
    background: rgba(143,123,101,0.9);
    color: white;
}
.sidebar.active {
    left: 0;
}

/* Main content */
.main {
    padding: 30px;
    position: relative;
    z-index: 1;
}

/* Add Supplier Section */
.add-section {
    background: rgba(200,180,150,0.95);
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
}
.add-section input {
    padding: 8px;
    border-radius: 5px;
    border: 1px solid #a88a78;
}
.add-section button {
    padding: 8px 15px;
    background: #4b3a2a;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
.add-section button:hover {
    background: #2e1f13;
}

/* Supplier Table */
.table-container {
    background: rgba(200,180,150,0.95);
    padding: 15px;
    border-radius: 12px;
    overflow-x: auto;
}
table {
    width: 100%;
    border-collapse: collapse;
}
th, td {
    padding: 10px;
    border-bottom: 1px solid #a88a78;
    text-align: center;
}
th {
    background: rgba(193,168,142,0.9);
}
.edit-btn {
    background: #2e86de;
    color: white;
    padding: 5px 10px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}
.delete-btn {
    background: #c0392b;
    color: white;
    padding: 5px 10px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}

/* Search Modal */
#openSearchModal {
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 1000;
    padding: 12px 15px;
    border: none;
    border-radius: 50px;
    background: #4b3a2a;
    color: white;
    font-size: 18px;
    cursor: pointer;
}
.modal {
    display: none;
    position: fixed;
    z-index: 10000;
    left: 0; top: 0;
    width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
}
.modal-content {
    background: #d8c4ad;
    padding: 20px;
    border-radius: 12px;
    width: 90%;
    max-width: 400px;
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.modal-close {
    position: absolute;
    top: 5px; right: 10px;
    font-size: 22px;
    cursor: pointer;
}
.modal-content input {
    width: 100%;
    padding: 8px;
    border-radius: 5px;
    border: 1px solid #a88a78;
}
</style>
</head>

<body>

<!-- Topbar -->
<div class="topbar">
    <div class="menu-btn">☰</div>
    <h2>Suppliers</h2>
</div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <a href="dashboard.html">Dashboard</a>
    <a href="items.html">Items</a>
    <a href="sales.html">Sales</a>
    <a href="reports.html">Reports</a>
    <a href="suppliers.html">Suppliers</a>
    <a href="#" id="logoutBtn">Logout</a>
</div>

<!-- Main -->
<div class="main">

    <div class="add-section">
        <input type="text" id="supplierName" placeholder="Supplier Name">
        <input type="text" id="supplierContact" placeholder="Contact Info">
        <button onclick="addSupplier()">Add Supplier</button>
    </div>

    <div class="table-container">
        <table id="suppliersTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Contact</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

</div>

<!-- Search Modal -->
<button id="openSearchModal">🔍</button>
<div class="modal" id="searchModal">
    <div class="modal-content">
        <span class="modal-close" id="closeSearchModal">&times;</span>
        <input type="text" id="searchInputModal" placeholder="Search supplier..." oninput="filterSuppliers()">
    </div>
</div>

<script>
let allSuppliers = [];

/* Sidebar toggle */
const sidebar = document.getElementById("sidebar");
document.querySelector(".menu-btn").addEventListener("click", e => {
    e.stopPropagation();
    sidebar.classList.toggle("active");
});
document.addEventListener("click", e => {
    if (!sidebar.contains(e.target) && !document.querySelector(".menu-btn").contains(e.target))
        sidebar.classList.remove("active");
});

/* Logout */
document.getElementById("logoutBtn").addEventListener("click", async e => {
    e.preventDefault();
    await fetch("/logout", { method: "POST", credentials: "include" });
    window.location = "login.html";
});

/* Modal Search */
const searchModal = document.getElementById("searchModal");
document.getElementById("openSearchModal").onclick = () => searchModal.style.display = "flex";
document.getElementById("closeSearchModal").onclick = () => searchModal.style.display = "none";
window.onclick = e => { if (e.target == searchModal) searchModal.style.display = "none"; }

/* Load Suppliers */
async function loadSuppliers() {
    const res = await fetch("/api/suppliers", { credentials: "include" });
    allSuppliers = await res.json();
    renderSuppliers(allSuppliers);
}

/* Render Table */
function renderSuppliers(suppliers) {
    const tbody = document.querySelector("#suppliersTable tbody");
    tbody.innerHTML = "";
    suppliers.forEach(s => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${s._id}</td>
            <td>${s.name}</td>
            <td>${s.contact}</td>
            <td>
                <button class="edit-btn" onclick="editSupplier('${s._id}', this)">Edit</button>
                <button class="delete-btn" onclick="deleteSupplier('${s._id}')">Delete</button>
            </td>
        `;
        tbody.appendChild(tr);
    });
}

/* Add Supplier */
async function addSupplier() {
    const name = document.getElementById("supplierName").value;
    const contact = document.getElementById("supplierContact").value;
    if (!name) return alert("Name required");
    await fetch("/api/suppliers", {
        method: "POST",
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, contact })
    });
    document.getElementById("supplierName").value = "";
    document.getElementById("supplierContact").value = "";
    loadSuppliers();
}

/* Delete Supplier */
async function deleteSupplier(id) {
    if (!confirm("Delete supplier?")) return;
    await fetch(`/api/suppliers/${id}`, { method: "DELETE" });
    loadSuppliers();
}

/* Search Filter */
function filterSuppliers() {
    const term = document.getElementById("searchInputModal").value.toLowerCase();
    renderSuppliers(allSuppliers.filter(s =>
        s.name.toLowerCase().includes(term) ||
        (s.contact && s.contact.toLowerCase().includes(term))
    ));
}

loadSuppliers();
</script>

</body>
</html>
