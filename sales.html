<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales - Vaporia</title>

<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:#d8c4ad;position:relative;}
body::before{content:"";position:fixed;width:100%;height:100%;background:url('vaporia.jpg');background-size:400px auto;background-position:center;opacity:0.25;z-index:-1;}
.topbar{padding:15px;background:rgba(193,168,142,0.9);display:flex;align-items:center;z-index:1;position:relative;}
.menu-btn{font-size:26px;cursor:pointer;margin-right:20px;}
.sidebar{position:fixed;left:-250px;top:0;width:250px;height:100%;background:rgba(168,146,120,0.95);padding-top:60px;transition:0.3s;z-index:9999;}
.sidebar a{display:block;padding:15px;text-decoration:none;color:#4b3a2a;font-size:18px;}
.sidebar a:hover{background:rgba(143,123,101,0.9);color:white;}
.sidebar.active{left:0;}
.main{padding:30px;position:relative;z-index:1;}

.add-section{
background:rgba(200,180,150,0.95);
padding:20px;
border-radius:12px;
margin-bottom:20px;
display:flex;
flex-wrap:wrap;
gap:10px;
align-items:center;
}

.add-section input,.add-section select{
padding:8px;
border-radius:5px;
border:1px solid #a88a78;
}

.add-section button{
padding:8px 15px;
background:#4b3a2a;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.add-section button:hover{
background:#2e1f13;
}

table{
width:100%;
border-collapse:collapse;
background:#d8c4ad;
}

th,td{
border:2px solid #6b5a48;
padding:10px;
text-align:center;
}

th{
background:#b9a68d;
}

.delete-btn{
background:#c0392b;
color:white;
padding:5px 8px;
border:none;
border-radius:4px;
cursor:pointer;
}

.delete-btn:hover{
background:#7b241c;
}
</style>
</head>

<body>

<div class="topbar">
<div class="menu-btn">☰</div>
<h2>Sales</h2>
</div>

<div class="sidebar" id="sidebar">
<a href="dashboard.html">Dashboard</a>
<a href="items.html">Items</a>
<a href="sales.html">Sales</a>
<a href="reports.html">Reports</a>
<a href="suppliers.html">Suppliers</a>
<a href="#" id="logoutBtn">Logout</a>
</div>

<div class="main">

<div class="add-section">
<select id="itemSelect">
<option value="">Select Item</option>
</select>

<input type="number" id="quantity" placeholder="Quantity">
<input type="number" id="price" placeholder="Price" readonly>

<button onclick="addSale()">Add Sale</button>
</div>

<h3>Sales Records</h3>

<table>
<thead>
<tr>
<th>ID</th>
<th>Item</th>
<th>Price</th>
<th>Quantity</th>
<th>Total</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>

<tbody id="salesTable"></tbody>

</table>

</div>

<script>

document.addEventListener("DOMContentLoaded",()=>{

const sidebar=document.getElementById("sidebar");
const menuBtn=document.querySelector(".menu-btn");
const logoutBtn=document.getElementById("logoutBtn");

const itemSelect=document.getElementById("itemSelect");
const priceInput=document.getElementById("price");
const salesTable=document.getElementById("salesTable");

menuBtn.onclick=e=>{
e.stopPropagation();
sidebar.classList.toggle("active");
};

document.addEventListener("click",e=>{
if(!sidebar.contains(e.target)&&!menuBtn.contains(e.target)){
sidebar.classList.remove("active");
}
});

logoutBtn.onclick=async e=>{
e.preventDefault();
await fetch("/logout",{method:"POST",credentials:"include"});
window.location="login.html";
};

let items=[];

/* LOAD ITEMS */

async function loadItems(){

const res=await fetch("/api/items",{credentials:"include"});
items=await res.json();

itemSelect.innerHTML=`<option value="">Select Item</option>`;

items.forEach(item=>{
itemSelect.innerHTML+=`
<option value="${item._id}" data-price="${item.price}" data-stock="${item.stock}">
${item.name} (${item.stock})
</option>
`;
});

}

/* ITEM CHANGE */

itemSelect.addEventListener("change",()=>{

const selected=itemSelect.selectedOptions[0];

priceInput.value=selected ? selected.dataset.price : "";

});

/* LOAD SALES */

async function loadSales(){

const res=await fetch("/api/sales",{credentials:"include"});
const sales=await res.json();

salesTable.innerHTML="";

sales.forEach((s,index)=>{

const tr=document.createElement("tr");

const date=new Date(s.date).toLocaleDateString();

tr.innerHTML=`
<td>${index+1}</td>
<td>${s.itemName}</td>
<td>${s.price}</td>
<td>${s.quantity}</td>
<td>${s.total}</td>
<td>${date}</td>
<td><button class="delete-btn">Delete</button></td>
`;

tr.querySelector(".delete-btn").onclick=async()=>{

await fetch(`/api/sales/${s._id}`,{
method:"DELETE",
credentials:"include"
});

loadSales();
loadItems();

};

salesTable.appendChild(tr);

});

}

/* ADD SALE */

window.addSale=async()=>{

const itemId=itemSelect.value;
const quantity=parseInt(document.getElementById("quantity").value);
const price=parseFloat(priceInput.value);

if(!itemId||!quantity||!price){
alert("Fill all fields");
return;
}

const selectedItem=items.find(i=>i._id===itemId);

if(quantity>selectedItem.stock){
alert("Not enough stock");
return;
}

await fetch("/api/sales",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({item:itemId,quantity,price}),

credentials:"include"

});

document.getElementById("quantity").value="";
priceInput.value="";
itemSelect.value="";

loadSales();
loadItems();

};

/* INIT */

loadItems();
loadSales();

});

</script>

</body>
</html>
