<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales - Vaporia</title>
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #d8c4ad;
    position: relative;
}
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('vaporia.jpg');
    background-size: 400px auto;
    background-position: center;
    opacity: 0.25;
    z-index: -1;
}
.topbar {
    padding: 15px;
    background: rgba(193,168,142,0.9);
    display: flex;
    align-items: center;
    z-index: 1;
    position: relative;
}
.menu-btn {
    font-size: 26px;
    cursor: pointer;
    margin-right: 20px;
}
.sidebar {
    position: fixed;
    left: -250px;
    top: 0;
    width: 250px;
    height: 100%;
    background: rgba(168,146,120,0.95);
    padding-top: 60px;
    transition: 0.3s;
    z-index: 9999;
}
.sidebar a {
    display: block;
    padding: 15px;
    text-decoration: none;
    color: #4b3a2a;
    font-size: 18px;
}
.sidebar a:hover { background: rgba(143,123,101,0.9); color: white; }
.sidebar.active { left: 0; }

.main {
    padding: 30px;
    position: relative;
    z-index: 1;
}
.add-section {
    background: rgba(200,180,150,0.95);
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
}
.add-section input,
.add-section select {
    padding: 8px;
    border-radius: 5px;
    border: 1px solid #a88a78;
}
.add-section button {
    padding: 8px 15px;
    background: #4b3a2a;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
.add-section button:hover { background: #2e1f13; }

table {
    width: 100%;
    border-collapse: collapse;
    background: #d8c4ad;
}
th, td {
    border: 2px solid #6b5a48;
    padding: 10px;
    text-align: center;
}
th { background: #b9a68d; }

.delete-btn {
    background: #c0392b;
    color: white;
    padding: 5px 8px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}
.delete-btn { background: #c0392b; }
</style>
</head>
<body>

<div class="topbar">
    <div class="menu-btn">☰</div>
    <h2>Sales</h2>
</div>

<div class="sidebar" id="sidebar">
    <a href="dashboard.html">Dashboard</a>
    <a href="items.html">Items</a>
    <a href="sales.html">Sales</a>
    <a href="reports.html">Reports</a>
    <a href="suppliers.html">Suppliers</a>
    <a href="#" id="logoutBtn">Logout</a>
</div>

<div class="main">
    <div class="add-section">
        <select id="itemSelect">
            <option value="">Select Item</option>
        </select>
        <input type="number" id="quantity" placeholder="Quantity">
        <input type="text" id="price" placeholder="Price" readonly>
        <button onclick="addSale()">Add Sale</button>
    </div>

    <h3>Sales Records</h3>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Item</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Total</th>
                <th>Date</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="salesTable"></tbody>
    </table>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const tbody = document.getElementById("salesTable");

    // =========================
    // LOAD SALES
    // =========================
    async function loadSales() {
        try {
            const res = await fetch("/api/sales", { credentials: "include" });
            if (!res.ok) throw new Error("Failed to fetch sales");
            const sales = await res.json();

            tbody.innerHTML = "";
            sales.forEach(s => {
                const tr = document.createElement("tr");
                const date = new Date(s.date).toLocaleDateString();
                tr.innerHTML = `
                    <td>${s._id}</td>
                    <td>${s.itemName}</td>
                    <td>${s.price}</td>
                    <td>${s.quantity}</td>
                    <td>${s.total}</td>
                    <td>${date}</td>
                    <td><button class="delete-btn">Delete</button></td>
                `;

                // Delete button
                tr.querySelector(".delete-btn").addEventListener("click", () => deleteSale(s._id));

                tbody.appendChild(tr);
            });
        } catch (err) {
            console.error("Error loading sales:", err);
        }
    }

    // =========================
    // ADD SALE
    // =========================
    async function addSale() {
        const item = document.getElementById("itemSelect").value;
        const quantity = parseInt(document.getElementById("quantity").value);
        const price = parseFloat(document.getElementById("price").value);

        if (!item || !quantity || !price) {
            alert("Fill all fields");
            return;
        }

        const total = quantity * price;

        await fetch("/api/sales", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ item, quantity, price, total }),
            credentials: "include"
        });

        document.getElementById("quantity").value = "";
        document.getElementById("price").value = "";

        loadSales();
    }

    // =========================
    // DELETE SALE
    // =========================
    async function deleteSale(id) {
        if (!confirm("Delete this sale?")) return;
        await fetch(`/api/sales/${id}`, { method: "DELETE", credentials: "include" });
        loadSales();
    }

    // =========================
    // INITIALIZE
    // =========================
    document.getElementById("addSaleBtn").addEventListener("click", addSale);
    loadSales();
});
</script>

</body>
</html>
