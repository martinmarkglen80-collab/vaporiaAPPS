<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales - Vaporia</title>

<style>

/* BODY */

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#d8c4ad;
position:relative;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:url('vaporia.jpg');
background-size:400px auto;
background-position:center;
opacity:0.25;
z-index:-1;
}

/* TOPBAR */

.topbar{
padding:15px;
background:rgba(193,168,142,0.9);
display:flex;
align-items:center;
position:relative;
z-index:1;
}

.menu-btn{
font-size:26px;
cursor:pointer;
margin-right:20px;
}

/* SIDEBAR */

.sidebar{
position:fixed;
left:-250px;
top:0;
width:250px;
height:100%;
background:rgba(168,146,120,0.95);
padding-top:60px;
transition:0.3s;
z-index:9999;
}

.sidebar a{
display:block;
padding:15px;
text-decoration:none;
color:#4b3a2a;
font-size:18px;
}

.sidebar a:hover{
background:rgba(143,123,101,0.9);
color:white;
}

.sidebar.active{
left:0;
}

/* MAIN */

.main{
padding:30px;
position:relative;
z-index:1;
}

/* ADD SALE SECTION */

.add-section{
background:rgba(200,180,150,0.95);
padding:20px;
border-radius:12px;
margin-bottom:20px;
display:flex;
flex-wrap:wrap;
gap:10px;
align-items:center;
}

.add-section input,
.add-section select{
padding:8px;
border-radius:5px;
border:1px solid #a88a78;
}

.add-section button{
padding:8px 15px;
background:#4b3a2a;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.add-section button:hover{
background:#2e1f13;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
background:#d8c4ad;
}

th,td{
border:2px solid #6b5a48;
padding:10px;
text-align:center;
}

th{
background:#b9a68d;
}

.delete-btn{
background:#c0392b;
color:white;
padding:5px 8px;
border:none;
border-radius:4px;
cursor:pointer;
}

.delete-btn:hover{
background:#7b241c;
}

</style>
</head>

<body>

<!-- TOPBAR -->

<div class="topbar">
<div class="menu-btn">☰</div>
<h2>Sales</h2>
</div>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">
<a href="dashboard.html">Dashboard</a>
<a href="items.html">Items</a>
<a href="sales.html">Sales</a>
<a href="reports.html">Reports</a>
<a href="suppliers.html">Suppliers</a>
<a href="#" id="logoutBtn">Logout</a>
</div>

<!-- MAIN -->

<div class="main">

<div class="add-section">

<select id="itemSelect">
<option value="">Select Item</option>
</select>

<input type="number" id="quantity" placeholder="Quantity">

<input type="text" id="price" placeholder="Price" readonly>

<button onclick="addSale()">Add Sale</button>

</div>

<h3>Sales Records</h3>

<table>

<thead>
<tr>
<th>ID</th>
<th>Item</th>
<th>Price</th>
<th>Quantity</th>
<th>Total</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>

<tbody id="salesTable"></tbody>

</table>

</div>

<script>
  // Prevent access if no login token exists
  if (!document.cookie.split("; ").some(c => c.trim().startsWith("token="))) {
    window.location.replace("login.html"); // Redirect to login
  }
</script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const tbody = document.getElementById("salesTable");

  const sidebar = document.getElementById("sidebar");
  const menuBtn = document.querySelector(".menu-btn");
  const logoutBtn = document.getElementById("logoutBtn");

  const itemSelect = document.getElementById("itemSelect");
  const quantityInput = document.getElementById("quantity");
  const priceInput = document.getElementById("price");

  // =========================
  // SIDEBAR TOGGLE
  // =========================
  menuBtn.addEventListener("click", e => {
    e.stopPropagation();
    sidebar.classList.toggle("active");
  });

  document.addEventListener("click", e => {
    if (!sidebar.contains(e.target) && !menuBtn.contains(e.target)) {
      sidebar.classList.remove("active");
    }
  });

  // =========================
  // LOGOUT
  // =========================
 logoutBtn.addEventListener("click", async e => {
  e.preventDefault();

  // Logout on server
  await fetch("/logout", { method: "POST", credentials: "include" });

  // Redirect to login and remove current page from history
  window.location.replace("login.html");
});

  // =========================
  // LOAD ITEMS
  // =========================
  async function loadItems() {
    const res = await fetch("/api/items", { credentials: "include" });
    const items = await res.json();

    itemSelect.innerHTML = '<option value="">Select Item</option>';

    items.forEach(i => {
      const option = document.createElement("option");
      option.value = i._id;
      option.dataset.price = i.price;
      option.dataset.stock = i.stock;
      option.textContent = i.name;
      itemSelect.appendChild(option);
    });
  }

  // =========================
  // AUTO PRICE & CHECK STOCK
  // =========================
  itemSelect.addEventListener("change", () => {
    const selected = itemSelect.selectedOptions[0];
    priceInput.value = selected ? selected.dataset.price : "";
    quantityInput.max = selected ? selected.dataset.stock : "";
  });

  // =========================
  // LOAD SALES
  // =========================
  async function loadSales() {
    const res = await fetch("/api/sales", { credentials: "include" });
    const sales = await res.json();

    tbody.innerHTML = "";

    sales.forEach(s => {
      const tr = document.createElement("tr");
      const date = new Date(s.date).toLocaleDateString();

      tr.innerHTML = `
        <td>${s._id}</td>
        <td>${s.itemName}</td>
        <td>${s.price}</td>
        <td>${s.quantity}</td>
        <td>${s.total}</td>
        <td>${date}</td>
        <td><button class="delete-btn">Refund</button></td>
      `;

      // REFUND SALE
      tr.querySelector(".delete-btn").addEventListener("click", async () => {
        if (confirm("Confirm refund?")) {
          const res = await fetch(`/api/sales/refund/${s._id}`, {
            method: "POST",
            credentials: "include"
          });

          if (!res.ok) {
            alert("Refund failed");
            return;
          }

          loadSales();
          loadItems();
        }
      });

      tbody.appendChild(tr);
    });
  }

  // =========================
  // ADD SALE
  // =========================
  async function addSale() {
    const itemId = itemSelect.value;
    const quantity = parseInt(quantityInput.value);
    const price = parseFloat(priceInput.value);

    if (!itemId || !quantity || !price) {
      alert("Fill all fields");
      return;
    }

    const selectedOption = itemSelect.selectedOptions[0];
    const stock = parseInt(selectedOption.dataset.stock);

    if (quantity > stock) {
      alert("Quantity exceeds available stock");
      return;
    }

    await fetch("/api/sales", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ item: itemId, quantity, price }),
      credentials: "include"
    });

    // Clear form
    itemSelect.value = "";
    quantityInput.value = "";
    priceInput.value = "";

    loadSales();
    loadItems();
  }

  window.addSale = addSale;

  // =========================
  // INITIAL LOAD
  // =========================
  loadItems();
  loadSales();
});
</script>

</body>
</html>
