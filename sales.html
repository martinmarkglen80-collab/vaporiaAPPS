<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales - Vaporia</title>
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #d8c4ad;
    position: relative;
}
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('vaporia.jpg');
    background-size: 400px auto;
    background-position: center;
    opacity: 0.25;
    z-index: -1;
}
.topbar {
    padding: 15px;
    background: rgba(193,168,142,0.9);
    display: flex;
    align-items: center;
    z-index: 1;
    position: relative;
}
.menu-btn {
    font-size: 26px;
    cursor: pointer;
    margin-right: 20px;
}
.sidebar {
    position: fixed;
    left: -250px;
    top: 0;
    width: 250px;
    height: 100%;
    background: rgba(168,146,120,0.95);
    padding-top: 60px;
    transition: 0.3s;
    z-index: 9999;
}
.sidebar a {
    display: block;
    padding: 15px;
    text-decoration: none;
    color: #4b3a2a;
    font-size: 18px;
}
.sidebar a:hover { background: rgba(143,123,101,0.9); color: white; }
.sidebar.active { left: 0; }

.main {
    padding: 30px;
    position: relative;
    z-index: 1;
}
.add-section {
    background: rgba(200,180,150,0.95);
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
}
.add-section input,
.add-section select {
    padding: 8px;
    border-radius: 5px;
    border: 1px solid #a88a78;
}
.add-section button {
    padding: 8px 15px;
    background: #4b3a2a;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
.add-section button:hover { background: #2e1f13; }

table {
    width: 100%;
    border-collapse: collapse;
    background: #d8c4ad;
}
th, td {
    border: 2px solid #6b5a48;
    padding: 10px;
    text-align: center;
}
th { background: #b9a68d; }

.delete-btn {
    background: #c0392b;
    color: white;
    padding: 5px 8px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}
.delete-btn:hover { background: #7b241c; }
</style>
</head>
<body>

<div class="topbar">
    <div class="menu-btn">☰</div>
    <h2>Sales</h2>
</div>

<div class="sidebar" id="sidebar">
    <a href="dashboard.html">Dashboard</a>
    <a href="items.html">Items</a>
    <a href="sales.html">Sales</a>
    <a href="reports.html">Reports</a>
    <a href="suppliers.html">Suppliers</a>
    <a href="#" id="logoutBtn">Logout</a>
</div>

<div class="main">
    <div class="add-section">
        <select id="itemSelect">
            <option value="">Select Item</option>
        </select>
        <input type="number" id="quantity" placeholder="Quantity">
        <input type="text" id="price" placeholder="Price" readonly>
        <button onclick="addSale()">Add Sale</button>
    </div>

    <h3>Sales Records</h3>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Item</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Total</th>
                <th>Date</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="salesTable"></tbody>
    </table>
</div>

<script>

/* =========================
   VARIABLES
========================= */

let availableItems = [];

const sidebar = document.getElementById("sidebar");
const menuBtn = document.querySelector(".menu-btn");
const logoutBtn = document.getElementById("logoutBtn");


/* =========================
   SIDEBAR MENU
========================= */

menuBtn.onclick = (e) => {
    e.stopPropagation();
    sidebar.classList.toggle("active");
};

document.addEventListener("click", (e) => {
    if (!sidebar.contains(e.target) && !menuBtn.contains(e.target)) {
        sidebar.classList.remove("active");
    }
});


/* =========================
   LOGOUT
========================= */

logoutBtn.onclick = async (e) => {
    e.preventDefault();

    await fetch("/logout", {
        method: "POST",
        credentials: "include"
    });

    window.location = "login.html";
};


/* =========================
   LOAD ITEMS FOR DROPDOWN
========================= */

async function loadItemsForSales() {

    const res = await fetch("/api/items", {
        credentials: "include"
    });

    availableItems = (await res.json()).filter(i => i.stock > 0);

    const select = document.getElementById("itemSelect");

    select.innerHTML = `<option value="">Select Item</option>`;

    availableItems.forEach(item => {

        const opt = document.createElement("option");

        opt.value = item._id;
        opt.textContent = item.name;

        select.appendChild(opt);

    });

}


/* =========================
   AUTO PRICE
========================= */

document
.getElementById("itemSelect")
.addEventListener("change", function () {

    const item = availableItems.find(i => i._id === this.value);

    document.getElementById("price").value =
        item ? item.price : "";

});


/* =========================
   LOAD SALES
========================= */

async function loadSales() {

    const res = await fetch("/api/sales", {
        credentials: "include"
    });

    const sales = await res.json();

    const tbody = document.getElementById("salesTable");

    tbody.innerHTML = "";

    sales.forEach((s, i) => {

        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${i + 1}</td>
            <td>${s.itemName}</td>
            <td>₱${s.price}</td>
            <td>${s.quantity}</td>
            <td>₱${s.total}</td>
            <td>${new Date(s.date).toLocaleString()}</td>
            <td>
                <button class="delete-btn"
                onclick="deleteSale('${s._id}')">
                Delete
                </button>
            </td>
        `;

        tbody.appendChild(tr);

    });

}


/* =========================
   ADD SALE
========================= */

async function addSale() {

    const itemId = document.getElementById("itemSelect").value;
    const quantity = document.getElementById("quantity").value;

    if (!itemId || !quantity) {
        alert("Select item and quantity");
        return;
    }

    await fetch("/api/sales", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ itemId, quantity }),
        credentials: "include"
    });

    document.getElementById("quantity").value = "";
    document.getElementById("price").value = "";
    document.getElementById("itemSelect").value = "";

    loadSales();
    loadItemsForSales();

}


/* =========================
   DELETE SALE
========================= */

async function deleteSale(id) {

    if (!confirm("Delete sale?")) return;

    await fetch("/api/sales/" + id, {
        method: "DELETE",
        credentials: "include"
    });

    loadSales();
    loadItemsForSales();

}


/* =========================
   INITIAL LOAD
========================= */

loadItemsForSales();
loadSales();

</script>

</body>
</html>
