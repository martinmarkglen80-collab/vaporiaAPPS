<!DOCTYPE html>
<html>
<head>
<title>Sales - Vaporia</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* ======================
   BODY
====================== */

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#d8c4ad;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:url('vaporia.jpg');
background-size:400px auto;
background-position:center;
opacity:0.25;
z-index:-1;
}

/* ======================
   SIDEBAR
====================== */

.sidebar{
position:fixed;
left:0;
top:0;
width:250px;
height:100%;
background:#b9a68d;
padding-top:40px;
border-right:3px solid #333;
}

.sidebar h2{
text-align:center;
margin-bottom:40px;
}

.sidebar a{
display:block;
padding:20px;
font-size:22px;
text-decoration:none;
color:black;
border-bottom:1px solid rgba(0,0,0,0.2);
}

.sidebar a:hover{
background:#a8957b;
}

.logout{
position:absolute;
bottom:30px;
left:40px;
padding:10px 30px;
border:2px solid #333;
background:#cbb89e;
cursor:pointer;
}

/* ======================
   MAIN CONTENT
====================== */

.main{
margin-left:270px;
padding:40px;
}

/* ======================
   BUTTON
====================== */

.add-btn{
padding:12px 30px;
background:#cbb89e;
border:2px solid #333;
font-weight:bold;
cursor:pointer;
margin-bottom:20px;
}

/* ======================
   TABLE
====================== */

table{
width:100%;
border-collapse:collapse;
background:#d8c4ad;
}

th, td{
border:2px solid #6b5a48;
padding:15px;
text-align:center;
}

th{
background:#b9a68d;
}

/* ======================
   SEARCH BUTTON
====================== */

.search-btn{
position:fixed;
top:20px;
right:20px;
background:#cbb89e;
border:2px solid #333;
padding:10px 15px;
cursor:pointer;
font-size:22px;
}

/* ======================
   SEARCH MODAL
====================== */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.modal-content{
background:#d8c4ad;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
}

.modal-content input{
width:100%;
padding:10px;
margin-top:10px;
}

.close{
float:right;
cursor:pointer;
font-size:22px;
}

</style>
</head>

<body>

<!-- ======================
     SIDEBAR
====================== -->

<div class="sidebar">

<h2>Dashboard</h2>

<a href="items.html">Items</a>
<a href="suppliers.html">Suppliers</a>
<a href="reports.html">Reports</a>

<button class="logout">Logout</button>

</div>


<!-- ======================
     MAIN CONTENT
====================== -->

<div class="main">

<button class="add-btn">Add Sales</button>

<table>

<tr>
<th>ID</th>
<th>Customer Name</th>
<th>Product Id</th>
<th>Quantity</th>
<th>Actions</th>
</tr>

<tr>
<td></td>
<td></td>
<td></td>
<td></td>
<td></td>
</tr>

</table>

</div>


<!-- ======================
     SEARCH BUTTON
====================== -->

<button class="search-btn" onclick="openSearch()">🔍</button>


<!-- ======================
     SEARCH MODAL
====================== -->

<div class="modal" id="searchModal">

<div class="modal-content">

<span class="close" onclick="closeSearch()">×</span>

<h3>Search Sales</h3>

<input type="text" placeholder="Search sales...">

</div>

</div>


<!-- ======================
     SCRIPT
====================== -->

<script>

function openSearch(){
document.getElementById("searchModal").style.display="flex";
}

function closeSearch(){
document.getElementById("searchModal").style.display="none";
}

</script>

</body>
</html>
