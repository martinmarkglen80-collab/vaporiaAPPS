<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales - Vaporia</title>
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #d8c4ad;
    position: relative;
}
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url('vaporia.jpg');
    background-size: 400px auto;
    background-position: center top;
    opacity: 0.24;
    pointer-events: none;
    z-index: 0;
}
.topbar {
    padding: 15px;
    background: rgba(193,168,142,0.9);
    display: flex;
    align-items: center;
    z-index: 1;
    position: relative;
}
.menu-btn {
    font-size: 26px;
    cursor: pointer;
    margin-right: 20px;
}
.sidebar {
    position: fixed;
    left: -250px;
    top: 0;
    width: 250px;
    height: 100%;
    background: rgba(168,146,120,0.95);
    padding-top: 60px;
    transition: 0.3s;
    z-index: 9999;
}
.sidebar a {
    display: block;
    padding: 15px;
    text-decoration: none;
    color: #4b3a2a;
    font-size: 18px;
}
.sidebar a:hover {
    background: rgba(143,123,101,0.9);
    color: white;
}
.sidebar.active {
    left: 0;
}
.main {
    padding: 30px;
    position: relative;
    z-index: 1;
}
.add-section {
    background: rgba(200,180,150,0.95);
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
}
.add-section select,
.add-section input {
    padding: 8px;
    border-radius: 5px;
    border: 1px solid #a88a78;
}
.add-section button {
    padding: 8px 15px;
    background: #4b3a2a;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
.add-section button:hover {
    background: #2e1f13;
}
table {
    width: 100%;
    border-collapse: collapse;
    background: #d8c4ad;
}
th, td {
    border: 2px solid #6b5a48;
    padding: 10px;
    text-align: center;
}
th {
    background: #b9a68d;
}
</style>
</head>
<body>

<div class="topbar">
    <div class="menu-btn">☰</div>
    <h2>Sales</h2>
</div>

<div class="sidebar" id="sidebar">
    <a href="dashboard.html">Dashboard</a>
    <a href="items.html">Items</a>
    <a href="reports.html">Reports</a>
    <a href="suppliers.html">Suppliers</a>
    <a href="#" id="logoutBtn">Logout</a>
</div>

<div class="main">
    <div class="add-section">
        <select id="itemSelect" onchange="updatePrice()">
            <option value="">Select Item</option>
        </select>
        <input type="number" id="price" placeholder="Price" readonly>
        <input type="number" id="quantity" placeholder="Quantity">
        <button onclick="addSale()">Add Sale</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Item</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody id="salesTable"></tbody>
    </table>
</div>

<script>
const sidebar = document.getElementById("sidebar");
const menuBtn = document.querySelector(".menu-btn");
const logoutBtn = document.getElementById("logoutBtn");

menuBtn.onclick = e => {
    e.stopPropagation();
    sidebar.classList.toggle("active");
};

document.addEventListener("click", e => {
    if (!sidebar.contains(e.target) && !menuBtn.contains(e.target)) {
        sidebar.classList.remove("active");
    }
});

logoutBtn.onclick = async e => {
    e.preventDefault();
    await fetch("/logout", { method: "POST", credentials: "include" });
    window.location = "login.html";
};

let allItems = [];

async function loadItems() {
    const res = await fetch("/api/items", { credentials: "include" });
    allItems = await res.json();

    const sel = document.getElementById("itemSelect");
    sel.innerHTML = '<option value="">Select Item</option>';

    allItems
        .filter(i => i.stock > 0)
        .forEach(i => {
            sel.innerHTML += `<option value="${i._id}" data-price="${i.price}">${i.name} (Stock: ${i.stock})</option>`;
        });
}

function updatePrice() {
    const sel = document.getElementById("itemSelect");
    const price = sel.selectedOptions[0]?.dataset.price || 0;
    document.getElementById("price").value = price;
}

async function addSale() {
    const itemId = document.getElementById("itemSelect").value;
    const price = parseFloat(document.getElementById("price").value);
    const quantity = parseInt(document.getElementById("quantity").value);

    if (!itemId || !quantity) {
        alert("Select item and quantity");
        return;
    }

    const res = await fetch("/api/sales", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ itemId, quantity, price }),
        credentials: "include"
    });

    if (!res.ok) {
        alert((await res.json()).message);
        return;
    }

    document.getElementById("quantity").value = "";
    await loadItems();
    loadSalesTable();
}

async function loadSalesTable() {
    const res = await fetch("/api/sales", { credentials: "include" });
    const sales = await res.json();
    const tbody = document.getElementById("salesTable");
    tbody.innerHTML = "";

    sales.forEach(s => {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${s.itemName}</td><td>₱${s.price}</td><td>${s.quantity}</td><td>₱${s.total}</td>`;
        tbody.appendChild(tr);
    });
}

// Initial load
loadItems();
loadSalesTable();
</script>

</body>
</html>
